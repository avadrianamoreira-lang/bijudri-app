 <head>

 </head>
 <body class="h-full bg-cream font-body text-dark">
  <div id="app" class="app-shell"></div>
  <script>
// ─── State ───
let products = [];
let orders = [];
let cart = []; // Array de { productId, quantity }
let currentView = 'home'; // home | category | product | about | admin | admin-edit | login | admin-orders-detail | checkout | order-confirmation
let currentCategory = null;
let currentProductId = null;
let editingProduct = null;
let adminTab = 'products'; // products | orders | dashboard
let toastTimeout = null;
let isAuthenticated = false;
let adminOrdersTab = 'received'; // received | production | sent
let currentOrderDetail = null; // Para visualizar detalhes de encomenda
const ADMIN_PASSWORD = 'bd2026';
const WHATSAPP_NUMBER = '+351916292343';

const CATEGORIES = ['Bebé e criança', 'Mulher', 'Sustentáveis', 'Kits'];

const defaultConfig = {
  brand_name: 'BijuDri',
  brand_tagline: 'Feito à mão, pensado para ti',
  instagram_handle: '@bijudri.pt',
  about_text: 'A Bijudri nasceu do amor pelo artesanal, do cuidado com cada detalhe e da vontade de criar peças que contam histórias. Cada produto é feito à mão por Adriana Moreira, com materiais escolhidos a dedo e um toque pessoal que torna cada peça verdadeiramente única.',
  mbway_phone: '+351 91 234 5678',
  bank_iban: 'PT50 0000 0000 0000 0000 0000 0',
  background_color: '#F5F0EB',
  surface_color: '#FFFFFF',
  text_color: '#3D3630',
  primary_color: '#7A8B6F',
  accent_color: '#C4856A',
  font_family: 'Playfair Display',
  font_size: 16
};

let config = { ...defaultConfig };

// ─── SDK Init - MUST run before render ───
let lastOrderIds = new Set();
let currentFormImages = [];

const dataHandler = {
  onDataChanged(data) {
    try {
      const allData = data || [];
      
      // Filter products - ensure data_type matches
      const newProducts = allData.filter(item => item && item.data_type === 'product');
      products = newProducts.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      
      // Filter orders
      const newOrders = allData.filter(item => item && item.data_type === 'order') || [];
      
      // Send notifications for new orders
      newOrders.forEach(order => {
        if (!lastOrderIds.has(order.__backendId) && order.customer_name) {
          lastOrderIds.add(order.__backendId);
          sendOrderNotification(order);
        }
      });
      
      orders = newOrders;
      
      // Always render to ensure UI updates
      render();
    } catch (err) {
      console.error('Error in onDataChanged:', err);
      render();
    }
  }
};

async function requestNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const permission = await Notification.requestPermission();
  return permission === 'granted';
}

function sendOrderNotification(order) {
  if (Notification.permission !== 'granted') return;
  
  const productsList = order.products.split('|||').map(p => p.trim()).slice(0, 3).join(', ');
  const moreProducts = order.products.split('|||').length > 3 ? ` +${order.products.split('|||').length - 3} mais` : '';
  
  const notification = new Notification('🎉 Nova Encomenda!', {
    body: `${order.customer_name}\n${productsList}${moreProducts}\n${order.total_price.toFixed(2)}€`,
    tag: `order-${order.__backendId}`,
    requireInteraction: false
  });
  
  notification.onclick = () => {
    window.focus();
    navigate('admin-orders-detail', order.__backendId);
    notification.close();
  };
}

// Initialize SDKs - MUST be called only ONCE after DOM is ready
async function initSDKs() {
  try {
    // Initialize Element SDK first (synchronous)
    if (window.elementSdk) {
      try {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (c) => {
            config = { ...defaultConfig, ...c };
            render();
          },
          mapToCapabilities: (c) => ({
            recolorables: [
              { get: () => c.background_color || defaultConfig.background_color, set: v => { c.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
              { get: () => c.surface_color || defaultConfig.surface_color, set: v => { c.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
              { get: () => c.text_color || defaultConfig.text_color, set: v => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
              { get: () => c.primary_color || defaultConfig.primary_color, set: v => { c.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
              { get: () => c.accent_color || defaultConfig.accent_color, set: v => { c.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
            ],
            borderables: [],
            fontEditable: { get: () => c.font_family || defaultConfig.font_family, set: v => { c.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
            fontSizeable: { get: () => c.font_size || defaultConfig.font_size, set: v => { c.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
          }),
          mapToEditPanelValues: (c) => new Map([
            ['brand_name', c.brand_name || defaultConfig.brand_name],
            ['brand_tagline', c.brand_tagline || defaultConfig.brand_tagline],
            ['instagram_handle', c.instagram_handle || defaultConfig.instagram_handle],
            ['about_text', c.about_text || defaultConfig.about_text],
            ['mbway_phone', c.mbway_phone || defaultConfig.mbway_phone],
            ['bank_iban', c.bank_iban || defaultConfig.bank_iban]
          ])
        });
      } catch (elementErr) {
        console.warn('Element SDK init issue:', elementErr);
      }
    }

    // Initialize Data SDK
    if (window.dataSdk) {
      try {
        const initResult = await window.dataSdk.init(dataHandler);
        if (!initResult.isOk) {
          console.warn('Data SDK init returned error:', initResult.error);
        }
      } catch (dataErr) {
        console.warn('Data SDK init error:', dataErr);
      }
    }

    // Render after SDKs initialization attempt
    render();
  } catch (err) {
    console.error('Unexpected error in initSDKs:', err);
    render();
  }
}

// Initialize when DOM is ready - MUST wait for app element
function waitForApp() {
  const app = document.getElementById('app');
  if (app) {
    initSDKs();
  } else {
    setTimeout(waitForApp, 50);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', waitForApp, { once: true });
} else {
  waitForApp();
}

// ─── Helpers ───
const bg = () => config.background_color || defaultConfig.background_color;
const sf = () => config.surface_color || defaultConfig.surface_color;
const tx = () => config.text_color || defaultConfig.text_color;
const pr = () => config.primary_color || defaultConfig.primary_color;
const ac = () => config.accent_color || defaultConfig.accent_color;
const ff = () => `${config.font_family || defaultConfig.font_family}, Georgia, serif`;
const fb = () => `Nunito, sans-serif`;
const fs = () => config.font_size || defaultConfig.font_size;
const bn = () => config.brand_name || defaultConfig.brand_name;
const bt = () => config.brand_tagline || defaultConfig.brand_tagline;
const igHandle = () => config.instagram_handle || defaultConfig.instagram_handle;
const mbwayPhone = () => config.mbway_phone || defaultConfig.mbway_phone;
const bankIban = () => config.bank_iban || defaultConfig.bank_iban;

function getImages(p) {
  if (!p.image_urls) return [];
  return p.image_urls.split('|||').filter(u => u.trim());
}
function getMainImage(p) {
  const imgs = getImages(p);
  const idx = p.main_image_index || 0;
  return imgs[idx] || '';
}
function activeProducts() { 
  return products.filter(p => p && p.is_active !== false); 
}
function featuredProducts() { 
  return activeProducts().filter(p => p && p.is_featured); 
}
function productsByCategory(cat) { 
  return activeProducts().filter(p => p && p.category === cat); 
}

function showToast(msg, type='success') {
  clearTimeout(toastTimeout);
  const t = document.getElementById('toast');
  if (t) {
    t.innerHTML = `<div class="toast-msg px-5 py-3 rounded-xl shadow-lg text-white text-sm font-medium" style="background:${type==='error'?'#c44':'#7A8B6F'}">${msg}</div>`;
    t.classList.remove('hidden');
    toastTimeout = setTimeout(() => t.classList.add('hidden'), 2500);
  }
}

function navigate(view, data) {
  // Protect admin routes
  if ((view === 'admin' || view === 'admin-edit' || view === 'admin-orders' || view === 'admin-dashboard' || view === 'admin-orders-detail') && !isAuthenticated) {
    currentView = 'login';
    render();
    document.querySelector('.app-shell')?.scrollTo(0, 0);
    return;
  }
  currentView = view;
  if (view === 'category') currentCategory = data;
  if (view === 'product') currentProductId = data;
  if (view === 'admin-edit') {
    editingProduct = data ? products.find(p => p.__backendId === data) : null;
    currentFormImages = [];
  }
  if (view === 'admin') {
    adminTab = data || 'products';
  }
  if (view === 'admin-orders-detail') currentOrderDetail = data;
  render();
  document.querySelector('.app-shell')?.scrollTo(0, 0);
}

// ─── Product Image Placeholder ───
function imgPlaceholder(size = 200) {
  return `<div style="width:100%;height:${size}px;background:linear-gradient(135deg,#E8DDD3,#E8C4C0);display:flex;align-items:center;justify-content:center;border-radius:12px;color:#999;">
    <div style="text-align:center;">
      <div style="font-size:32px;margin-bottom:8px;">📷</div>
      <div style="font-size:12px;">Imagem não carregada</div>
    </div>
  </div>`;
}

function optimizeCloudinary(url) {
  if (!url || !url.includes('cloudinary.com')) return url;
  return url.replace('/upload/', '/upload/w_800,q_auto,f_auto/');
}

function productImage(url, h=200, cls='', clickable=false) {
  if (!url) return imgPlaceholder(h);
  const optimized = optimizeCloudinary(url);
  const clickAttr = clickable ? `onclick="showImageViewer('${url}')" class="cursor-pointer hover:opacity-90 transition-opacity"` : '';
  return `<img src="${optimized}" alt="Produto" loading="lazy" ${clickAttr} class="${cls}" style="width:100%;height:${h}px;object-fit:cover;border-radius:12px;" onerror="this.style.background='linear-gradient(135deg,#E8DDD3,#E8C4C0)';this.style.display='none';">`;
}

// ─── Render ───
function render() {
  const app = document.getElementById('app');
  if (!app) {
    // If app element doesn't exist yet, retry in a moment
    setTimeout(() => render(), 100);
    return;
  }
  
  app.style.background = bg();
  app.style.color = tx();

  let html = '';
  try {
    switch (currentView) {
      case 'login': html = renderLogin(); break;
      case 'home': html = renderHome(); break;
      case 'category': html = renderCategory(); break;
      case 'product': html = renderProduct(); break;
      case 'about': html = renderAbout(); break;
      case 'checkout': html = renderCheckout(); break;
      case 'order-confirmation': html = renderOrderConfirmation(); break;
      case 'admin': 
        if (adminTab === 'dashboard') html = renderAdminDashboard();
        else if (adminTab === 'orders') html = renderAdminOrders();
        else html = renderAdmin();
        break;
      case 'admin-edit': html = renderAdminEdit(); break;
      case 'admin-orders-detail': html = renderOrderDetail(); break;
    }
  } catch (renderErr) {
    console.error('Error rendering view:', renderErr);
    html = `<div style="padding:20px;text-align:center;color:red"><p>Erro ao carregar a página</p><button onclick="currentView='home';render()">Voltar ao início</button></div>`;
  }
  
  html += `<div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50"></div>`;
  html += renderConfirmModal();
  
  // Update HTML
  try {
    app.innerHTML = html;
    lucide.createIcons();
    // Delay attachEvents para garantir que o DOM está pronto
    setTimeout(() => attachEvents(), 100);
  } catch (updateErr) {
    console.error('Error updating DOM:', updateErr);
  }
}
function navbar(title, showBack=false, showAdmin=false) {
  const notificationStatus = Notification.permission === 'granted' ? '🔔' : '🔕';
  return `<nav class="sticky top-0 z-40 px-4 py-3 flex items-center justify-between" style="background:${bg()}ee;backdrop-filter:blur(10px);">
    <div class="flex items-center gap-3">
      ${showBack ? `<button onclick="navigate('home')" class="p-1 hover:opacity-70 transition-opacity" title="Voltar"><i data-lucide="arrow-left" style="width:20px;height:20px;color:${tx()}"></i></button>` : ''}
      <span style="font-family:${ff()};font-size:${fs()*1.2}px;font-weight:600;color:${tx()}">${title}</span>
    </div>
    <div class="flex items-center gap-2">
      ${showAdmin && isAuthenticated ? `
        <button onclick="navigate('admin','dashboard')" class="p-2 rounded-full hover:opacity-70 transition-all" style="background:${sf()}" title="Dashboard de Vendas"><i data-lucide="bar-chart-2" style="width:18px;height:18px;color:${pr()}"></i></button>
        <button id="btn-notifications" class="p-2 rounded-full hover:opacity-70 transition-all" title="${Notification.permission === 'granted' ? 'Notificações ativas' : 'Ativar notificações'}" style="background:${sf()}"><span style="font-size:18px">${notificationStatus}</span></button>
        <button onclick="navigate('admin','products')" class="p-2 rounded-full hover:opacity-70 transition-all" style="background:${sf()}" title="Gestão"><i data-lucide="settings" style="width:18px;height:18px;color:${pr()}"></i></button>
        <button onclick="logoutAdmin()" class="p-2 rounded-full hover:opacity-70 transition-all" title="Terminar sessão"><i data-lucide="log-out" style="width:18px;height:18px;color:${tx()}"></i></button>
      ` : showAdmin ? `<button onclick="navigate('admin','products')" class="p-2 rounded-full hover:opacity-70 transition-all" style="background:${sf()}" title="Gestão"><i data-lucide="settings" style="width:18px;height:18px;color:${pr()}"></i></button>` : ''}
    </div>
  </nav>`;
}

// ─── Login ───
function renderLogin() {
  return `
  <div class="h-full flex flex-col items-center justify-center px-4" style="background:linear-gradient(135deg,${pr()}22,${ac()}22)">
    <div class="text-center mb-8">
      <div class="w-20 h-20 rounded-full mx-auto flex items-center justify-center text-5xl mb-4" style="background:${sf()}">🔐</div>
      <h1 style="font-family:${ff()};font-size:${fs()*1.8}px;font-weight:700">Acesso Restrito</h1>
      <p class="text-sm opacity-60 mt-2">Área de gestão da loja</p>
    </div>

    <form id="login-form" class="w-full max-w-sm rounded-2xl p-6 shadow-lg" style="background:${sf()}">
      <div class="mb-4">
        <label class="text-sm font-medium opacity-70 mb-2 block">Senha</label>
        <input type="password" id="login-password" placeholder="Introduz a senha" class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${bg()};border-color:${tx()}22" required>
      </div>
      <button type="submit" class="w-full py-3 rounded-full text-white font-semibold transition-transform hover:scale-105 shadow-md" style="background:${pr()}">Entrar</button>
      <button type="button" onclick="navigate('home')" class="w-full mt-2 py-3 rounded-full font-semibold text-sm" style="background:${bg()}">Voltar</button>
    </form>
  </div>`;
}

function logoutAdmin() {
  isAuthenticated = false;
  navigate('home');
}

function toggleNotifications() {
  requestNotificationPermission().then(granted => {
    if (granted) {
      showToast('✅ Notificações ativadas!');
    } else {
      showToast('❌ Permissão de notificações recusada', 'error');
    }
    render(); // Update navbar icon
  });
}
function renderHome() {
  const featured = featuredProducts();
  const catCounts = CATEGORIES.map(c => ({ name: c, count: productsByCategory(c).length }));
  const allActive = activeProducts();
  const catIcons = { 'Bebé e criança': '👶', 'Mulher': '👩', 'Sustentáveis': '🌿', 'Kits': '🎁' };

  return `
  ${navbar(bn(), false, true)}
  <!-- Banner -->
  <div class="px-4 pt-4 pb-6 slide-up slide-up-1">
    <div class="rounded-2xl p-6 relative overflow-hidden" style="background:linear-gradient(135deg,${pr()}22,${ac()}22);border:1px solid ${pr()}33">
      <div class="relative z-10">
        <p style="font-family:${ff()};font-size:${fs()*1.6}px;font-weight:600;color:${tx()};line-height:1.3">${bt()}</p>
        <p class="mt-2 opacity-70" style="font-size:${fs()*0.85}px">Peças únicas, criadas com amor ✨</p>
        <button onclick="navigate('about')" class="mt-4 px-5 py-2 rounded-full text-white text-sm font-medium transition-transform hover:scale-105" style="background:${pr()}">Conhecer a marca</button>
      </div>
      <div class="absolute -right-4 -bottom-4 text-7xl opacity-10">🧶</div>
    </div>
  </div>

  ${featured.length > 0 ? `
  <!-- Featured -->
  <div class="px-4 pb-4 slide-up slide-up-2">
    <h2 style="font-family:${ff()};font-size:${fs()*1.25}px;font-weight:600" class="mb-3">✨ Destaques</h2>
    <div class="flex gap-3 overflow-x-auto img-gallery pb-2">
      ${featured.map(p => `
        <div onclick="navigate('product','${p.__backendId}')" class="flex-shrink-0 cursor-pointer rounded-2xl overflow-hidden shadow-sm transition-transform hover:scale-[1.02]" style="width:200px;background:${sf()}">
          ${productImage(getMainImage(p), 180)}
          <div class="p-3">
            <p class="font-medium truncate" style="font-size:${fs()*0.9}px">${p.name || 'Sem nome'}</p>
            <p class="font-bold mt-1" style="color:${ac()};font-size:${fs()}px">${p.price ? p.price.toFixed(2) + '€' : ''}</p>
          </div>
        </div>
      `).join('')}
    </div>
  </div>` : ''}

  <!-- Categories -->
  <div class="px-4 pb-4 slide-up slide-up-3">
    <h2 style="font-family:${ff()};font-size:${fs()*1.25}px;font-weight:600" class="mb-3">Categorias</h2>
    <div class="grid grid-cols-2 gap-3">
      ${catCounts.map(c => `
        <button onclick="navigate('category','${c.name}')" class="rounded-2xl p-4 text-left transition-transform hover:scale-[1.02] shadow-sm" style="background:${sf()}">
          <span class="text-2xl">${catIcons[c.name] || '📦'}</span>
          <p class="mt-2 font-semibold" style="font-size:${fs()*0.95}px">${c.name}</p>
          <p class="text-xs opacity-50 mt-0.5">${c.count} produto${c.count !== 1 ? 's' : ''}</p>
        </button>
      `).join('')}
    </div>
  </div>

  ${allActive.length > 0 ? `
  <!-- All Products -->
  <div class="px-4 pb-8 slide-up slide-up-4">
    <h2 style="font-family:${ff()};font-size:${fs()*1.25}px;font-weight:600" class="mb-3">Todos os Produtos</h2>
    <div class="grid grid-cols-2 gap-3">
      ${allActive.map(p => productCard(p)).join('')}
    </div>
  </div>` : `
  <div class="px-4 pb-8 text-center opacity-50 slide-up slide-up-4">
    <p class="text-5xl mb-3">🧵</p>
    <p style="font-size:${fs()}px">Ainda não há produtos.</p>
    <p class="text-sm mt-1">Acede à gestão para adicionar.</p>
  </div>`}

  ${footerNav()}`;
}

function productCard(p) {
  return `<div onclick="navigate('product','${p.__backendId}')" class="cursor-pointer rounded-2xl overflow-hidden shadow-sm transition-transform hover:scale-[1.02]" style="background:${sf()}">
    ${productImage(getMainImage(p), 160)}
    <div class="p-3">
      <p class="font-medium truncate" style="font-size:${fs()*0.85}px">${p.name || 'Sem nome'}</p>
      ${p.category ? `<p class="text-xs opacity-50 mt-0.5">${p.category}</p>` : ''}
      <p class="font-bold mt-1" style="color:${ac()};font-size:${fs()*0.95}px">${p.price ? p.price.toFixed(2) + '€' : ''}</p>
    </div>
  </div>`;
}

function footerNav() {
  const items = [
    { icon: 'home', label: 'Início', view: 'home' },
    { icon: 'heart', label: 'Sobre', view: 'about' },
    { icon: 'shopping-bag', label: `Carrinho${cart.length > 0 ? ` (${cart.length})` : ''}`, view: 'checkout' },
    { icon: 'settings', label: 'Gestão', view: 'admin' }
  ];
  return `<nav class="sticky bottom-0 flex justify-around py-3 border-t" style="background:${sf()};border-color:${tx()}11">
    ${items.map(i => `
      <button onclick="navigate('${i.view}')" class="flex flex-col items-center gap-1 transition-colors" style="color:${currentView===i.view?pr():tx()+'88'}">
        <i data-lucide="${i.icon}" style="width:20px;height:20px"></i>
        <span class="text-xs font-medium">${i.label}</span>
      </button>
    `).join('')}
  </nav>`;
}

// ─── Category ───
function renderCategory() {
  const prods = productsByCategory(currentCategory);
  return `
  ${navbar(currentCategory, true)}
  <div class="px-4 py-4 fade-in">
    ${prods.length > 0 ? `
      <div class="grid grid-cols-2 gap-3">
        ${prods.map(p => productCard(p)).join('')}
      </div>
    ` : `
      <div class="text-center py-12 opacity-50">
        <p class="text-4xl mb-2">📦</p>
        <p>Sem produtos nesta categoria.</p>
      </div>
    `}
  </div>
  ${footerNav()}`;
}

// ─── Product Detail ───
function renderProduct() {
  const p = products.find(x => x.__backendId === currentProductId);
  if (!p) return `${navbar('Produto', true)}<div class="p-8 text-center">Produto não encontrado.</div>${footerNav()}`;
  const imgs = getImages(p);
  const igUrl = config.instagram_handle || defaultConfig.instagram_handle;

  return `
  ${navbar(p.name || 'Produto', true)}
  <div class="fade-in">
    <!-- Image Gallery -->
    <div class="px-4 pt-2">
      ${imgs.length > 0 ? `
        <div class="rounded-2xl overflow-hidden shadow-md bg-gray-100 cursor-pointer hover:opacity-90 transition-opacity" onclick="showImageViewer('${imgs[p.main_image_index || 0]}', ${JSON.stringify(imgs).replace(/"/g, '&quot;')})">
          ${productImage(imgs[p.main_image_index || 0], 380, '', true)}
        </div>
        ${imgs.length > 1 ? `
          <div class="flex gap-2 mt-3 overflow-x-auto img-gallery pb-2">
            ${imgs.map((url, i) => `
              <button type="button" onclick="event.preventDefault(); showImageViewer('${url}', ${JSON.stringify(imgs).replace(/"/g, '&quot;')})" class="flex-shrink-0 rounded-lg border-2 transition-all overflow-hidden hover:scale-105" style="width:70px;height:70px;border-color:${i===(p.main_image_index||0)?pr():'transparent'};background:linear-gradient(135deg,#E8DDD3,#E8C4C0)">
                <img src="${optimizeCloudinary(url)}" alt="Imagem ${i+1}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;" onerror="this.parentElement.style.background='#e5e7eb';">
              </button>
            `).join('')}
          </div>
        ` : ''}
      ` : imgPlaceholder(280)}
    </div>

    <div class="px-4 py-4">
      ${p.is_featured ? `<span class="inline-block px-3 py-1 rounded-full text-xs font-medium text-white mb-2" style="background:${ac()}">✨ Destaque</span>` : ''}
      <h1 style="font-family:${ff()};font-size:${fs()*1.5}px;font-weight:700">${p.name || 'Sem nome'}</h1>
      ${p.category ? `<p class="opacity-50 text-sm mt-1">${p.category}</p>` : ''}
      <p class="mt-2 font-bold" style="font-size:${fs()*1.4}px;color:${ac()}">${p.price ? p.price.toFixed(2) + '€' : ''}</p>

      ${p.description ? `<div class="mt-4 leading-relaxed opacity-80" style="font-size:${fs()*0.9}px">${p.description.replace(/\n/g, '<br>')}</div>` : ''}

      ${p.customization_note ? `
        <div class="mt-4 p-4 rounded-xl" style="background:${pr()}11;border:1px solid ${pr()}33">
          <p class="font-semibold text-sm mb-1" style="color:${pr()}">🎨 Personalização</p>
          <p class="text-sm opacity-80">${p.customization_note}</p>
        </div>
      ` : ''}

      ${p.external_link ? `
        <a href="${p.external_link}" target="_blank" rel="noopener noreferrer" class="mt-3 flex items-center gap-2 text-sm font-medium" style="color:${pr()}">
          <i data-lucide="external-link" style="width:16px;height:16px"></i> Ver tecidos disponíveis
        </a>
      ` : ''}

      <a href="https://instagram.com/${igHandle().replace('@', '')}" target="_blank" rel="noopener noreferrer" class="mt-3 flex items-center gap-2 text-sm font-medium" style="color:${pr()}">
        <i data-lucide="instagram" style="width:16px;height:16px"></i> ${igHandle()}
      </a>

      <button data-add-cart="${currentProductId}" class="mt-6 w-full flex items-center justify-center gap-2 py-3.5 rounded-full text-white font-semibold transition-transform hover:scale-[1.02] shadow-lg" style="background:linear-gradient(135deg,${pr()},${ac()});font-size:${fs()}px">
        <i data-lucide="shopping-cart" style="width:20px;height:20px"></i> Adicionar ao Carrinho
      </button>
      <a href="https://instagram.com/${igHandle().replace('@', '')}" target="_blank" rel="noopener noreferrer" class="mt-2 w-full flex items-center justify-center gap-2 py-2 rounded-full text-white font-semibold text-sm opacity-80 hover:opacity-100 transition-all" style="background:${pr()}">
        <i data-lucide="message-circle" style="width:16px;height:16px"></i> Encomendar via Instagram
      </a>
    </div>
  </div>
  ${footerNav()}`;
}

// ─── About ───
function renderAbout() {
  const newAboutTxt = `Sobre a Bijudri

A Bijudri nasceu da minha paixão por criar. Desde os 9 anos, quando aprendi ponto de cruz com a minha avó, que gosto de transformar ideias em peças únicas. Aos 15 anos, durante as aulas de Educação Visual, descobri a argila polimérica e comecei a criar bijuteria para mim e para a família. O nome Bijudri surgiu da junção de "bijuteria" com o diminutivo carinhoso do meu nome, Dri; e desde então, acompanho este projeto ao longo da minha vida, evoluindo para a costura em tecido e feltro, sempre com o desejo de criar algo especial para cada pessoa.

Hoje, crio peças artesanais e personalizadas para bebés, crianças e mulheres, sempre privilegiando materiais naturais e sustentáveis. Cada artigo é produzido manualmente, com atenção ao detalhe, e maioritariamente por encomenda, garantindo que cada criação seja única.

As minhas clientes são mulheres que procuram praticidade, organização, simplicidade e um presente especial. A Bijudri oferece exatamente isso: produtos pensados para cada fase da vida, com um toque artesanal e personalizado que não se encontra em qualquer lado.

Os valores da Bijudri refletem quem somos: autenticidade, simplicidade, criatividade e empatia no atendimento. A minha intenção é criar peças premium, minimalistas e artesanais, feitas com carinho e atenção aos detalhes.

Por trás da Bijudri está Adriana Moreira, mãe de um menino e prestes a receber uma menina, que acredita na conciliação entre família e paixão. Trabalho para as minhas clientes, mas sempre mantendo espaço para os momentos que realmente importam, porque cada criação nasce de dedicação e amor: tanto pelo que faço, quanto pelas pessoas que a recebem.`;
  
  return `
  ${navbar('Sobre', true)}
  <div class="px-4 py-6 fade-in">
    <div class="text-center mb-6">
      <div class="w-24 h-24 rounded-full mx-auto flex items-center justify-center text-4xl" style="background:linear-gradient(135deg,${pr()}33,${ac()}33)">🧶</div>
      <h1 class="mt-4" style="font-family:${ff()};font-size:${fs()*1.6}px;font-weight:700">${bn()}</h1>
      <p class="italic opacity-60 mt-1" style="font-family:${ff()};font-size:${fs()}px">${bt()}</p>
    </div>
    <div class="rounded-2xl p-5" style="background:${sf()}">
      <p class="leading-relaxed whitespace-pre-wrap" style="font-size:${fs()*0.95}px">${newAboutTxt}</p>
    </div>
    <div class="grid grid-cols-3 gap-3 mt-6 text-center pb-8">
      ${[['🌿','Sustentável'],['✋','Feito à mão'],['💝','Com amor']].map(([e,t]) => `
        <div class="rounded-xl p-4" style="background:${sf()}">
          <span class="text-2xl">${e}</span>
          <p class="text-xs font-medium mt-2 opacity-70">${t}</p>
        </div>
      `).join('')}
    </div>
  </div>
  ${footerNav()}`;
}

// ─── Admin Edit Form ───
function renderAdminEdit() {
  const isNew = !editingProduct;
  const p = isNew ? { name:'', category:'', description:'', price:'', image_urls:'', main_image_index:0, customization_note:'', external_link:'', is_featured:false, is_active:true } : { ...editingProduct };
  
  // Initialize form images list
  if (!isNew && currentFormImages.length === 0 && p.image_urls) {
    currentFormImages = getImages(p);
  }

  try {
    return `
  ${navbar(isNew ? 'Novo Produto' : 'Editar Produto', true)}
  <div class="px-4 py-4 fade-in">
    <form id="product-form" class="space-y-4">
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Nome *</label>
        <input name="name" value="${(p.name||'').replace(/"/g,'&quot;')}" required class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${sf()};border-color:${tx()}22" placeholder="Nome do produto">
      </div>
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Categoria</label>
        <select name="category" class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${sf()};border-color:${tx()}22">
          <option value="">Sem categoria</option>
          ${CATEGORIES.map(c => `<option value="${c}" ${p.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Preço (€)</label>
        <input name="price" type="number" step="0.01" min="0" value="${p.price||''}" class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${sf()};border-color:${tx()}22" placeholder="0.00">
      </div>
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Descrição</label>
        <textarea name="description" rows="4" class="w-full px-4 py-3 rounded-xl border text-sm resize-none" style="background:${sf()};border-color:${tx()}22" placeholder="Descreve o produto...">${p.description||''}</textarea>
      </div>
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Nota de Personalização</label>
        <input name="customization_note" value="${(p.customization_note||'').replace(/"/g,'&quot;')}" class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${sf()};border-color:${tx()}22" placeholder="Ex: Escolha tecido e cor">
      </div>
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Link Externo (Tecidos)</label>
        <input name="external_link" value="${(p.external_link||'').replace(/"/g,'&quot;')}" class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${sf()};border-color:${tx()}22" placeholder="https://drive.google.com/...">
      </div>

      <!-- Images -->
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">URLs de Imagens</label>
        <div class="flex gap-2 mb-2">
          <input type="text" id="temp-image-url" placeholder="Cola link da imagem (HTTPS)" class="flex-1 px-4 py-2 rounded-lg border text-sm" style="background:${sf()};border-color:${tx()}22">
          <button type="button" id="btn-add-img" class="px-4 py-2 rounded-lg text-white text-sm font-medium" style="background:${pr()}">+ Adicionar</button>
        </div>
        <div id="image-list" class="space-y-2 mb-3"></div>
        <textarea name="image_urls" id="image_urls_hidden" class="hidden" style="display:none"></textarea>
        <p class="text-xs opacity-40" id="image-count-msg">0 imagem(ens) adicionada(s)</p>
      </div>

      <div id="main-image-section" class="hidden">
        <label class="text-sm font-medium opacity-70 mb-1 block">Imagem Principal</label>
        <div class="flex gap-2 overflow-x-auto img-gallery pb-2" id="main-image-selector"></div>
      </div>

      <div class="flex items-center gap-4">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="is_active" ${p.is_active!==false?'checked':''} class="w-4 h-4 rounded">
          <span class="text-sm">Ativo</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="is_featured" ${p.is_featured?'checked':''} class="w-4 h-4 rounded">
          <span class="text-sm">Destaque ★</span>
        </label>
      </div>

      <div class="flex gap-3 pt-2 pb-8">
        <button type="button" onclick="navigate('admin', 'products')" class="flex-1 py-3 rounded-xl font-medium text-sm border" style="border-color:${tx()}22">Cancelar</button>
        <button type="submit" id="btn-save" class="flex-1 py-3 rounded-xl font-medium text-sm text-white" style="background:${pr()}">${isNew ? 'Criar' : 'Guardar'}</button>
      </div>
    </form>
  </div>`;
  } catch (err) {
    console.error('Error in renderAdminEdit:', err);
    return `${navbar('Erro', true)}<div class="p-8 text-center" style="color:red">Erro ao carregar formulário</div>`;
  }
}

// ─── Checkout ───
function renderCheckout() {
  if (cart.length === 0) return `${navbar('Carrinho', true)}<div class="px-4 py-12 text-center opacity-50">${footerNav()}<p class="text-4xl mb-2">🛒</p><p>Carrinho vazio.</p></div>`;
  
  const cartItems = cart.map(item => {
    const prod = products.find(p => p.__backendId === item.productId);
    return { ...item, product: prod };
  }).filter(i => i.product);
  
  const total = cartItems.reduce((sum, item) => sum + ((item.product.price || 0) * item.quantity), 0);
  
  return `
  ${navbar('Carrinho', true)}
  <div class="px-4 py-4 fade-in">
    <div class="space-y-3 mb-6">
      ${cartItems.map(item => `
        <div class="flex items-center gap-3 p-3 rounded-xl" style="background:${sf()}">
          <div class="w-12 h-12 flex-shrink-0 rounded-lg overflow-hidden" style="background:${bg()}">
            ${getMainImage(item.product) ? `<img src="${getMainImage(item.product)}" alt="" class="w-full h-full object-cover" loading="lazy">` : `<div class="w-full h-full flex items-center justify-center opacity-30">📷</div>`}
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-sm">${item.product.name || 'Produto'}</p>
            <p class="text-xs opacity-50 mt-0.5">${item.product.price.toFixed(2)}€ un.</p>
          </div>
          <div class="text-right">
            <p class="font-bold text-sm" style="color:${ac()}">${(item.product.price * item.quantity).toFixed(2)}€</p>
            <div class="flex gap-1 mt-1 items-center justify-end">
              <button data-cart-less="${item.productId}" class="px-2 py-1 rounded text-xs hover:bg-black/5 font-bold">-</button>
              <span class="px-2 text-xs font-medium">${item.quantity}</span>
              <button data-cart-more="${item.productId}" class="px-2 py-1 rounded text-xs hover:bg-black/5 font-bold">+</button>
              <button data-cart-del="${item.productId}" class="px-1 py-1 hover:text-red-500 ml-1"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="rounded-2xl p-4 mb-6" style="background:${pr()}11;border:1px solid ${pr()}33">
      <div class="flex justify-between items-center mb-2">
        <p class="opacity-70">Subtotal</p>
        <p class="font-semibold">${total.toFixed(2)}€</p>
      </div>
      <div class="flex justify-between items-center py-2 border-t" style="border-color:${pr()}33">
        <p class="font-bold">Total</p>
        <p class="font-bold text-lg" style="color:${pr()}">${total.toFixed(2)}€</p>
      </div>
    </div>

    <form id="checkout-form" class="space-y-4 pb-8">
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Nome *</label>
        <input name="customer_name" required class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${sf()};border-color:${tx()}22" placeholder="Teu nome">
      </div>
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Telemóvel *</label>
        <input name="customer_phone" required type="tel" class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${sf()};border-color:${tx()}22" placeholder="+351 91 234 5678">
      </div>
      <div>
        <label class="text-sm font-medium opacity-70 mb-1 block">Morada *</label>
        <textarea name="customer_address" required rows="3" class="w-full px-4 py-3 rounded-xl border text-sm resize-none" style="background:${sf()};border-color:${tx()}22" placeholder="Rua, número, código postal..."></textarea>
      </div>

      <div>
        <label class="text-sm font-medium opacity-70 mb-2 block">Tecidos Escolhidos *</label>
        <input name="chosen_fabrics" required class="w-full px-4 py-3 rounded-xl border text-sm" style="background:${sf()};border-color:${tx()}22" placeholder="Ex: EX-042 ou FO-034">
        <p class="text-xs opacity-50 mt-1">Indica o código dos tecidos que viste nos documentos de referência</p>

      <div>
        <label class="text-sm font-medium opacity-70 mb-2 block">Forro do Produto *</label>
        <div class="space-y-2">
          <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer border-2 transition-colors" style="border-color:${tx()}22;background:${sf()}">

              <p class="font-medium text-sm">Levantamento</p>

          </label>
          <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer border-2 transition-colors" style="border-color:${tx()}22;background:${sf()}">

          <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer border-2 transition-colors" style="border-color:${tx()}22;background:${sf()}">
            <input type="radio" name="shipping_method" value="ctt_registered" required class="w-4 h-4">

// ─── Admin Dashboard ───
function renderAdminDashboard() {
  const ordersByMonth = {};
  const productsSales = {};
  let totalRevenue = 0;

  orders.forEach(order => {
    const date = new Date(order.order_date);
    const monthKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    
    if (!ordersByMonth[monthKey]) ordersByMonth[monthKey] = 0;
    ordersByMonth[monthKey]++;

    const revenue = order.total_price || 0;
    totalRevenue += revenue;

    order.products.split('|||').forEach(product => {
      const prodName = product.trim();
      if (prodName) {
        if (!productsSales[prodName]) productsSales[prodName] = { count: 0, revenue: 0 };
        productsSales[prodName].count++;
        productsSales[prodName].revenue += revenue / order.products.split('|||').length;
      }
    });
  });

  const sortedMonths = Object.entries(ordersByMonth).sort().slice(-6);
  const topProducts = Object.entries(productsSales)
    .sort((a, b) => b[1].revenue - a[1].revenue)
    .slice(0, 5);

  return `
  ${navbar('Dashboard de Vendas', true)}
  <div class="px-4 py-4 fade-in pb-8">
    <!-- KPIs -->
    <div class="grid grid-cols-2 gap-3 mb-6">

        <p class="text-xs opacity-50 mb-1">Total de Encomendas</p>
        <p class="text-2xl font-bold" style="color:${pr()}">${orders.length}</p>
      </div>
      <div class="rounded-xl p-4" style="background:${sf()}">
        <p class="text-xs opacity-50 mb-1">Receita Total</p>
        <p class="text-2xl font-bold" style="color:${ac()}">${totalRevenue.toFixed(2)}€</p>
      </div>
    </div>

    <!-- Vendas por Mês -->
    <div class="rounded-xl p-4 mb-6" style="background:${sf()}">
      <p class="text-sm font-semibold mb-4" style="color:${pr()}">📊 Vendas por Mês</p>
      <div class="space-y-2">
        ${sortedMonths.map(([month, count]) => {
          const percentage = (count / Math.max(...Object.values(ordersByMonth))) * 100;
          return `
            <div>
              <div class="flex justify-between items-center mb-1 text-xs">
                <span class="opacity-70">${month}</span>
                <span class="font-medium">${count} encomenda${count !== 1 ? 's' : ''}</span>
              </div>
              <div class="h-2 rounded-full" style="background:${bg()}">
                <div class="h-2 rounded-full transition-all" style="background:${pr()};width:${percentage}%"></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <!-- Top Produtos -->
    <div class="rounded-xl p-4" style="background:${sf()}">
      <p class="text-sm font-semibold mb-4" style="color:${pr()}">⭐ Top Produtos (por Receita)</p>
      <div class="space-y-3">
        ${topProducts.length > 0 ? topProducts.map(([product, data]) => `
          <div class="p-3 rounded-lg" style="background:${bg()}">
            <div class="flex justify-between items-start mb-1">
              <p class="font-medium text-sm">${product}</p>
              <p class="text-sm font-bold" style="color:${ac()}">${data.revenue.toFixed(2)}€</p>
            </div>
            <p class="text-xs opacity-60">${data.count} venda${data.count !== 1 ? 's' : ''}</p>
          </div>
        `).join('') : `<p class="text-sm opacity-50 text-center py-4">Sem dados ainda</p>`}
      </div>
    </div>
  </div>
  ${footerNav()}`;
}

// ─── Image Viewer with Keyboard & Touch Navigation ───
let currentGalleryImages = [];
let currentGalleryIndex = 0;

function showImageViewer(url, allImages) {
  const viewer = document.getElementById('image-viewer');
  const img = document.getElementById('viewer-img');
  const dlLink = document.getElementById('download-img');
  
  // Ensure allImages is an array
  if (Array.isArray(allImages) && allImages.length > 0) {
    currentGalleryImages = allImages;
  } else if (url) {
    currentGalleryImages = [url];
  } else {
    return;
  }
  
  currentGalleryIndex = url ? currentGalleryImages.indexOf(url) : 0;
  if (currentGalleryIndex === -1) currentGalleryIndex = 0;
  
  if (viewer && img && dlLink) {
    updateViewerImage();
    viewer.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }
}

function updateViewerImage() {
  const img = document.getElementById('viewer-img');
  const dlLink = document.getElementById('download-img');
  const counter = document.getElementById('image-counter');
  const total = document.getElementById('image-total');
  
  if (img && dlLink && currentGalleryImages[currentGalleryIndex]) {
    img.src = currentGalleryImages[currentGalleryIndex];
    dlLink.href = currentGalleryImages[currentGalleryIndex];
  }
  
  if (counter && total) {
    counter.textContent = currentGalleryIndex + 1;
    total.textContent = currentGalleryImages.length;
  }
}

function nextImage() {
  if (currentGalleryImages.length > 1) {
    currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryImages.length;
    updateViewerImage();
  }
}

function prevImage() {
  if (currentGalleryImages.length > 1) {
    currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length;
    updateViewerImage();
  }
}

function closeImageViewer() {
  const viewer = document.getElementById('image-viewer');
  if (viewer) {
    viewer.classList.add('hidden');
    document.body.style.overflow = '';
  }
}

function addImageUrl() {
  const input = document.getElementById('temp-image-url');
  if (!input) return;
  
  let url = input.value.trim();

  if (!url) return;

  // Convert Google Drive links to direct view URLs
  if (url.includes('drive.google.com')) {
    const match = url.match(/\/d\/(.*?)\//);
    if (match && match[1]) {
      const fileId = match[1];
      url = `https://drive.google.com/uc?export=view&id=${fileId}`;
    } else {
      showToast('Link do Google Drive inválido. Usa o link de partilha.', 'error');
      return;
    }
  }

  // Ensure https
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    if (!url.startsWith('data:')) {
      url = 'https://' + url;
    }
  }

  // Validate format
  if (!url.startsWith('http') && !url.startsWith('data:')) {
    showToast('Link inválido - deve começar com https:// ou ser um link válido', 'error');
    return;
  }

  // Check for duplicates
  if (currentFormImages.includes(url)) {
    showToast('Esta imagem já foi adicionada', 'error');
    return;
  }

  // Max 10 images per product
  if (currentFormImages.length >= 10) {
    showToast('Máximo de 10 imagens por produto', 'error');
    return;
  }

  currentFormImages.push(url);
  input.value = '';
  renderImageList();
  showToast('Imagem adicionada! ✅');
}

function removeImageUrl(index) {
  currentFormImages.splice(index, 1);
  renderImageList();
}

        <img src="${url}" alt="" loading="lazy" class="w-10 h-10 rounded object-cover" onerror="this.style.display='none'">
        <span class="flex-1 truncate opacity-60 font-mono">${url.substring(0, 40)}...</span>
        <button type="button" data-remove-img="${i}" class="px-2 py-1 text-red-500 hover:opacity-70 transition">×</button>
      </div>
    `).join('');

    hiddenInput.value = currentFormImages.join('|||');
    
    // Update count
    const countMsg = `${currentFormImages.length} imagem${currentFormImages.length !== 1 ? 'ens' : ''} adicionada${currentFormImages.length !== 1 ? 's' : ''}`;
    if (countElem) countElem.textContent = countMsg;

    // Show/hide main image selector
    if (currentFormImages.length > 1 && mainSection && mainSelector) {
      mainSection.classList.remove('hidden');
      mainSelector.innerHTML = currentFormImages.map((url, i) => `
        <label class="flex-shrink-0 cursor-pointer">
          <input type="radio" name="main_image_index" value="${i}" ${i===0?'checked':''} class="hidden peer">
          <img src="${url}" alt="Img ${i+1}" loading="lazy" class="w-16 h-16 object-cover rounded-lg border-2 transition-all peer-checked:border-green-500" style="border-color:transparent" onerror="this.style.display='none'">
        </label>
      `).join('');
    } else if (mainSection) {
      mainSection.classList.add('hidden');
    }

    // Re-attach remove listeners
    setTimeout(() => {
      document.querySelectorAll('[data-remove-img]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          removeImageUrl(parseInt(btn.dataset.removeImg));
        });
      });
    }, 10);
  } catch (err) {
    console.error('Error in renderImageList:', err);
  }
}

// ─── Events ───
function attachEvents() {
  // Notification button
  document.getElementById('btn-notifications')?.addEventListener('click', () => {
    requestNotificationPermission().then(granted => {
      if (granted) {
        showToast('✅ Notificações ativadas!');
      } else {
        showToast('❌ Permissão de notificações recusada', 'error');
      }
      render(); // Update navbar icon
    });
  });

  // Admin add
  document.getElementById('btn-add')?.addEventListener('click', () => {
    if (products.length >= 999) { showToast('Limite de 999 produtos atingido!', 'error'); return; }
    editingProduct = null;
    navigate('admin-edit', null);
  });

  // Product card click - navigate to edit
  document.querySelectorAll('[data-product-id]').forEach(card => {
    card.addEventListener('click', () => {
      const productId = card.dataset.productId;
      navigate('admin-edit', productId);
    });
  });

  // Add image button
  document.getElementById('btn-add-img')?.addEventListener('click', (e) => {
    e.preventDefault();
    addImageUrl();
  });

  // Image URL input - Enter key
  document.getElementById('temp-image-url')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addImageUrl();
    }
  });

  // Remove image buttons
  document.querySelectorAll('[data-remove-img]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      removeImageUrl(parseInt(btn.dataset.removeImg));
    });
  });

  // Duplicate
  document.querySelectorAll('[data-dup]').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      if (products.length >= 999) { showToast('Limite atingido!', 'error'); return; }
      const p = products.find(x => x.__backendId === btn.dataset.dup);
      if (!p) return;
      btn.disabled = true;
      const r = await window.dataSdk.create({
        name: (p.name || '') + ' (cópia)',
        category: p.category || '',
        description: p.description || '',
        price: p.price || 0,
        image_urls: p.image_urls || '',
        main_image_index: p.main_image_index || 0,
        customization_note: p.customization_note || '',
        external_link: p.external_link || '',
        is_featured: false,
        is_active: false,
        sort_order: products.length,
        created_at: new Date().toISOString()
      });
      btn.disabled = false;
      if (r.isOk) showToast('Produto duplicado!');
      else showToast('Erro ao duplicar.', 'error');
    });
  });

  // Delete
  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const p = products.find(x => x.__backendId === btn.dataset.del);
      if (!p) return;
      showConfirm(`Eliminar "${p.name || 'produto'}"?`, async () => {
        const r = await window.dataSdk.delete(p);
        if (r.isOk) showToast('Eliminado!');
        else showToast('Erro ao eliminar.', 'error');
      });
    });
  });

  // Confirm modal
  document.getElementById('confirm-cancel')?.addEventListener('click', () => {
    document.getElementById('confirm-modal')?.classList.add('hidden');
    pendingConfirm = null;
  });
  document.getElementById('confirm-ok')?.addEventListener('click', async () => {
    document.getElementById('confirm-modal')?.classList.add('hidden');
    if (pendingConfirm) { await pendingConfirm(); pendingConfirm = null; }
  });

  // Image viewer - close on ESC and keyboard/touch navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeImageViewer();
    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'ArrowLeft') prevImage();
  });

  // Touch swipe support for image gallery
  let touchStartX = 0;
  let touchEndX = 0;
  const viewer = document.getElementById('image-viewer');
  if (viewer) {
    viewer.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, false);
    viewer.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, false);
  }

  function handleSwipe() {
    if (touchEndX < touchStartX - 50) nextImage(); // Swipe left
    if (touchEndX > touchStartX + 50) prevImage(); // Swipe right
  }

  // Product form - com merge de dados para edição
  document.getElementById('product-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);

    // Use currentFormImages array (validated URLs)
    const imgUrls = currentFormImages.join('|||');

    const newData = {
      data_type: 'product',
      name: fd.get('name') || '',
      category: fd.get('category') || '',
      description: fd.get('description') || '',
      price: parseFloat(fd.get('price')) || 0,
      image_urls: imgUrls,
      main_image_index: parseInt(fd.get('main_image_index')) || 0,
      customization_note: fd.get('customization_note') || '',
      external_link: fd.get('external_link') || '',
      is_featured: !!fd.get('is_featured'),
      is_active: !!fd.get('is_active')
    };

    const btn = document.getElementById('btn-save');
    if (btn) { btn.disabled = true; btn.textContent = 'A guardar...'; }

    let r;
    if (editingProduct && editingProduct.__backendId) {
      // Edição: merge completo mantendo __backendId
      const mergedData = {
        ...editingProduct,
        ...newData,
        __backendId: editingProduct.__backendId
      };
      r = await window.dataSdk.update(mergedData);
    } else {
      // Criação: novo produto
      if (products.length >= 999) { 
        if (btn) { btn.disabled = false; btn.textContent = 'Criar'; }
        showToast('Limite de 999 produtos!', 'error'); 
        return; 
      }
      const productData = {
        ...newData,
        sort_order: products.length,
        created_at: new Date().toISOString(),
        id: `prod_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`
      };
      r = await window.dataSdk.create(productData);
    }

    if (btn) { btn.disabled = false; btn.textContent = editingProduct ? 'Guardar' : 'Criar'; }

    if (r.isOk) {
      showToast(editingProduct ? 'Guardado!' : 'Produto criado!');
      currentFormImages = [];
      editingProduct = null;
      navigate('admin', 'products');
    } else {
      showToast('Erro ao guardar.', 'error');
    }
  });

  // Checkout form
  document.getElementById('checkout-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (cart.length === 0) { showToast('Carrinho vazio!', 'error'); return; }

    const fd = new FormData(e.target);
    const cartItems = cart.map(item => {
      const prod = products.find(p => p.__backendId === item.productId);
      return prod ? `${prod.name} (${item.quantity}x)` : '';
    }).filter(p => p).join('|||');

    const total = cart.reduce((sum, item) => {
      const prod = products.find(p => p.__backendId === item.productId);
      return sum + ((prod?.price || 0) * item.quantity);
    }, 0);

    // Show/hide InPost field based on selection
    const shippingMethod = fd.get('shipping_method');
    const inpostField = document.getElementById('inpost_location');
    if (shippingMethod === 'inpost' && inpostField && !inpostField.value.trim()) {
      showToast('Por favor, indica a morada do ponto InPost', 'error');
      return;
    }

    // Validate lining choice
    const liningChoice = fd.get('lining_choice');
    let finalLiningInfo = liningChoice;
    
    if (liningChoice === 'cotton') {
      const liningCodeField = document.getElementById('lining_code_cotton');
      const liningCode = liningCodeField?.value.trim() || '';
      if (!liningCode) {
        showToast('Por favor, indica o código do forro em algodão', 'error');
        return;
      }
      finalLiningInfo = `cotton - ${liningCode}`;
    }

    const orderData = {
      data_type: 'order',
      id: `order_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
      customer_name: fd.get('customer_name') || '',
      customer_phone: fd.get('customer_phone') || '',
      customer_address: fd.get('customer_address') || '',
      chosen_fabrics: fd.get('chosen_fabrics') || '',
      lining_choice: finalLiningInfo,
      inpost_location: fd.get('inpost_location') || '',
      products: cartItems,
      total_price: total,
      shipping_method: shippingMethod || 'pickup',
      payment_method: fd.get('payment_method') || 'mbway',
      customer_message: fd.get('customer_message') || '',
      status: 'received',
      order_date: new Date().toISOString()
    };

    const btn = document.getElementById('btn-checkout');
    if (btn) { btn.disabled = true; btn.textContent = 'A processar...'; }

    const r = await window.dataSdk.create(orderData);

    if (btn) { btn.disabled = false; btn.textContent = 'Encomendar'; }

    if (r.isOk) {
      cart = [];
      navigate('order-confirmation');
    } else {
      showToast('Erro ao criar encomenda.', 'error');
    }
  });

  // Show/hide InPost location field
  document.querySelectorAll('input[name="shipping_method"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const inpostField = document.getElementById('inpost_location');
      if (inpostField) {
        inpostField.classList.toggle('hidden', radio.value !== 'inpost');
        if (radio.value === 'inpost') inpostField.focus();
      }
    });
  });

  // Show/hide lining code field for cotton
  document.querySelectorAll('input[name="lining_choice"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const liningCodeField = document.getElementById('lining_code_cotton');
      if (liningCodeField) {
        liningCodeField.classList.toggle('hidden', radio.value !== 'cotton');
        if (radio.value === 'cotton') liningCodeField.focus();
      }
    });
  });
  
  document.querySelectorAll('[data-add-cart]').forEach(btn => {
    btn.addEventListener('click', () => {
      const pId = btn.dataset.addCart;
      const existing = cart.find(c => c.productId === pId);
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({ productId: pId, quantity: 1 });
      }
      showToast('Produto adicionado ao carrinho ✅');
      render();
    });
  });

  // Cart controls - decrease
  document.querySelectorAll('[data-cart-less]').forEach(btn => {
    btn.addEventListener('click', () => {
      const pId = btn.dataset.cartLess;
      const item = cart.find(c => c.productId === pId);
      if (item && item.quantity > 1) {
        item.quantity--;
        render();
      }
    });
  });

  // Cart controls - increase
  document.querySelectorAll('[data-cart-more]').forEach(btn => {
    btn.addEventListener('click', () => {
      const pId = btn.dataset.cartMore;
      const item = cart.find(c => c.productId === pId);
      if (item) {
        item.quantity++;
        render();
      }
    });
  });

  document.querySelectorAll('[data-cart-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const pId = btn.dataset.cartDel;
      cart = cart.filter(c => c.productId !== pId);
      if (cart.length === 0) navigate('home');
      else render();
    });
  });

  // Order status change
  document.querySelectorAll('[data-order-status]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const [orderId, newStatus] = btn.dataset.orderStatus.split('|');
      const order = orders.find(o => o.__backendId === orderId);
      if (!order) return;
      
      btn.disabled = true;
      const r = await window.dataSdk.update({ ...order, status: newStatus });
      btn.disabled = false;
      
      if (r.isOk) {
        showToast(`Encomenda movida para "${newStatus === 'production' ? 'Em produção' : 'Enviada'}"`);
        adminOrdersTab = newStatus;
        render();
      } else {
        showToast('Erro ao atualizar.', 'error');
      }
    });
  });

  // Order delete
  document.querySelectorAll('[data-order-delete]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const orderId = btn.dataset.orderDelete;
      const order = orders.find(o => o.__backendId === orderId);
      if (!order) return;
      showConfirm('Eliminar esta encomenda?', async () => {
        const r = await window.dataSdk.delete(order);
        if (r.isOk) showToast('Encomenda eliminada!');
        else showToast('Erro ao eliminar.', 'error');
      });
    });
  });

  // Login form
  document.getElementById('login-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    const pwd = document.getElementById('login-password').value;
    if (pwd === ADMIN_PASSWORD) {
      isAuthenticated = true;
      adminTab = 'products';
      navigate('admin', 'products');
      showToast('Bem-vindo! 🔓');
    } else {
      showToast('Senha incorreta', 'error');
      document.getElementById('login-password').value = '';
    }
  });
}
