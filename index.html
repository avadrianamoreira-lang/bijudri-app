<!DOCTYPE html>

<html lang="pt">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bijudri</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #f7f3ef;
      color: #575244;
      font-family: bright-retro, futura;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

const SUPABASE_URL = "https://kzlvxawotfnxjbnhysdx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6bHZ4YXdvdGZueGpibmh5c2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDQ4MzYsImV4cCI6MjA5MTM4MDgzNn0.Kh5ugtSRLQXLbsM2JXz6KJEv85L5H64IStftuLNfNd8";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ESTADO GLOBAL
let view = "home";
let selectedCategory = "Todas";
let cart = [];

// PRODUTOS EXEMPLO (substituímos depois pelos teus reais)
let products = [
  { id: "1", name: "Capa Livro Infantil", price: 18, category: "Bebé e criança", image: "https://via.placeholder.com/300" },
  { id: "2", name: "Bolsa Mulher", price: 22, category: "Mulher", image: "https://via.placeholder.com/300" },
  { id: "3", name: "Saco Reutilizável", price: 12, category: "Sustentáveis", image: "https://via.placeholder.com/300" },
  { id: "4", name: "Kit Costura", price: 25, category: "Kits", image: "https://via.placeholder.com/300" }
];

const categories = ["Todas", "Destaques", "Bebé e criança", "Mulher", "Sustentáveis", "Kits"];

// RENDER PRINCIPAL
function render() {
  const app = document.getElementById("app");

  if (view === "home") {
    const filtered = selectedCategory === "Todas"
      ? products
      : products.filter(p => p.category === selectedCategory);

    app.innerHTML = `
      <header class="p-4 flex justify-between items-center bg-white shadow">
        <img src="https://res.cloudinary.com/dohslobkh/image/upload/v1775900519/Novo_logo_Bijudri_2026_ex16c9.png" style="height:100px;">
        <button onclick="goToCart()" class="relative">
          <i data-lucide="shopping-cart"></i>
          <span class="absolute -top-2 -right-2 bg-[#cfa05d] text-white text-xs px-2 rounded-full">
            ${cart.reduce((a,i)=>a+i.qty,0)}
          </span>
        </button>
      </header>

      <div class="p-4">
        <div class="flex gap-2 overflow-x-auto mb-4">
          ${categories.map(cat => `
            <button onclick="selectCategory('${cat}')"
              class="px-3 py-1 rounded-full border ${selectedCategory===cat?'bg-[#cfa05d] text-white':''}">
              ${cat}
            </button>
          `).join("")}
        </div>

        <div class="grid grid-cols-2 gap-4">
          ${filtered.map(p => `
            <div class="bg-white p-3 rounded-xl shadow">
              <img src="${p.image}" class="w-full h-32 object-cover rounded">
              <h3 class="font-semibold mt-2 text-sm">${p.name}</h3>
              <p class="text-[#cfa05d] font-bold">${p.price}€</p>
              <button onclick="addToCart('${p.id}')"
                class="mt-2 w-full bg-[#575244] text-white py-2 rounded">
                Adicionar
              </button>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  if (view === "cart") {
    app.innerHTML = `
      <div class="p-4">
        <button onclick="view='home';render()">← Voltar</button>

        <h2 class="text-xl font-bold mt-2">Carrinho</h2>

        ${cart.length === 0 ? "<p>O carrinho está vazio</p>" : ""}

        ${cart.map(item => `
          <div class="bg-white p-3 mt-2 rounded flex justify-between">
            <span>${item.name} x ${item.qty}</span>
            <span>${item.price * item.qty}€</span>
          </div>
        `).join("")}

        <div class="mt-4 font-bold">
          Total: ${cart.reduce((a,i)=>a+i.price*i.qty,0)}€
        </div>

        <button class="mt-4 w-full bg-[#cfa05d] text-white py-3 rounded">
          Finalizar Encomenda
        </button>
      </div>
    `;
  }

  lucide.createIcons();
}

// FUNÇÕES
function selectCategory(cat) {
  selectedCategory = cat;
  render();
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(i => i.id === id);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  render();
}

function goToCart() {
  view = "cart";
  render();
}


// INIT
document.addEventListener("DOMContentLoaded", render);

async function createOrder(customer, cart, total) {

  const { data, error } = await supabase
    .from("orders")
    .insert({
      customer_name: customer.name,
      customer_email: customer.email,
      total: total,
      status: "pendente"
    })
    .select()
    .single();

  if (error) {
    alert("Erro ao criar encomenda");
    return;
  }

  const items = cart.map(item => ({
    order_id: data.id,
    product_name: item.name,
    quantity: item.qty,
    price: item.price
  }));

  await supabase.from("order_items").insert(items);

  alert("Encomenda criada com sucesso!");
}

async function calculateShipping(zone, weight) {
  const { data } = await supabase
    .from("shipping_rules")
    .select("*")
    .eq("zone", zone);

  const rule = data.find(r =>
    weight >= r.min_weight && weight <= r.max_weight
  );

  return rule ? rule.price : 0;
}



</script>

</body>
</html>
