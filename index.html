<body>

<div id="app"></div>



<script>
const SUPABASE_URL = "https://kzlvxawotfnxjbnhysdx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6bHZ4YXdvdGZueGpibmh5c2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDQ4MzYsImV4cCI6MjA5MTM4MDgzNn0.Kh5ugtSRLQXLbsM2JXz6KJEv85L5H64IStftuLNfNd8";

window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ESTADO GLOBAL
let view = "home";
let selectedCategory = "Todas";
let cart = [];
let products = [];
let selectedProduct = null;
let activeImage = 0;

// PRODUTOS EXEMPLO (substituímos depois pelos teus reais)
async function loadProducts() {
  const { data, error } = await window.supabaseClient
    .from("products")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    alert("Erro ao carregar produtos");
    return;
  }

  products = data || [];
  render();
}

const categories = ["Todas", "Destaques", "Bebé e criança", "Mulher", "Sustentáveis", "Kits"];

// RENDER PRINCIPAL
function render() {
  const app = document.getElementById("app");

  if (view === "home") {
    let filtered;

if (selectedCategory === "Todas") {
  filtered = products;
} else if (selectedCategory === "Destaques") {
  filtered = products.filter(p => p.featured === true);
} else {
  filtered = products.filter(p => p.category === selectedCategory);
}

    app.innerHTML = `
      <header class="p-6 flex justify-between items-center bg-white shadow">
        <img src="https://res.cloudinary.com/dohslobkh/image/upload/v1775900519/Novo_logo_Bijudri_2026_ex16c9.png" style="height:100px;">
        <button onclick="goToCart()" class="relative">
          <i data-lucide="shopping-cart"></i>
          <span class="absolute -top-4 -right-4 bg-[#cfa05d] text-white text-xs px-4 rounded-full">
            ${cart.reduce((a,i)=>a+i.qty,0)}
          </span>
        </button>
      </header>

      <div class="p-4">
        <div class="flex gap-2 overflow-x-auto mb-6">
          ${categories.map(cat => `
            <button onclick="selectCategory('${cat}')"
              class="px-1 py-4 rounded-full border ${selectedCategory===cat?'bg-[#cfa05d] text-white':''}">
              ${cat}
            </button>
          `).join("")}
        </div>

        <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
          ${filtered.map(p => `
            <div class="bg-white p-2 rounded-xl shadow-sm hover:shadow-md transition">
  <img src="${(p.image_url || '').split(',')[0]}" 
     onerror="this.src='https://via.placeholder.com/300x300?text=Sem+Imagem'"
     class="w-full h-60 object-cover rounded bg-gray-100">

  <h3 class="font-medium mt-1 text-xs leading-tight">${p.name}</h3>

  <p class="text-[#cfa05d] font-bold text-sm">${p.price}€</p>

  <button onclick="viewProduct('${p.id}')"
  class="mt-1 w-full border border-[#575244] text-[#575244] py-1 text-xs rounded">
  Ver produto
</button>

<button onclick="addToCart('${p.id}')"
  class="mt-1 w-full bg-[#575244] text-white py-1 text-xs rounded">
  Adicionar ao carrinho
</button>
</div>
          `).join("")}
        </div>
      </div>
    `;
  }
if (view === "product") {
  const p = selectedProduct;
  const images = (p.image_url || '').split(',');

  app.innerHTML = `
    <div class="p-4">

      <button onclick="view='home';render()">← Voltar</button>

      <h1 class="text-xl font-bold mt-2">${p.name}</h1>

      <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- IMAGEM PRINCIPAL -->
        <div>
          <img src="${images[activeImage]}" 
               onerror="this.src='https://via.placeholder.com/500'"
               class="w-full h-[600px] object-cover rounded-xl">
        </div>

        <!-- MINIATURAS -->
<div class="grid grid-cols-4 gap-2">
  ${images.map((img, index) => `
    <img src="${img}" 
         onclick="changeImage(${index})"
         class="w-full h-60 object-cover rounded cursor-pointer border 
         ${activeImage===index ? 'border-[#cfa05d]' : 'border-transparent'} 
         hover:scale-105 transition">
  `).join("")}
</div>

      <!-- INFO PRODUTO -->
      <div class="mt-6">
        <p class="text-[#cfa05d] text-lg font-bold">${p.price}€</p>

        <p class="mt-2 text-sm">${p.description || ''}</p>

        <div class="mt-3 text-xs text-gray-600">
          <p>Categoria: ${p.category || '-'}</p>
          <p>Stock: ${p.stock ?? '—'}</p>
      </div>  

        <button onclick="addToCart('${p.id}')"
          class="mt-4 w-full bg-[#575244] text-white py-3 rounded">
          Adicionar ao carrinho
        </button>

    </div>
  `;
}
if (view === "checkout") {

  app.innerHTML = `
    <div class="p-4">

      <button onclick="view='cart';render()">← Voltar</button>

      <h2 class="text-xl font-bold mt-2">Checkout</h2>

      <!-- FORMULÁRIO -->
      <div class="mt-4 space-y-3">
        <input id="name" placeholder="Nome" class="w-full p-2 border rounded">
        <input id="email" placeholder="Email" class="w-full p-2 border rounded">
        
        <select id="zone" onchange="updateShipping()" class="w-full p-2 border rounded">
  <option value="">Zona de envio</option>
  <option value="Portugal">Portugal</option>
  <option value="Ilhas">Ilhas</option>
</select>
      </div>

      <!-- RESUMO -->
      <div class="mt-6">
        <h3 class="font-bold">Resumo</h3>

        ${cart.map(item => `
          <div class="flex justify-between text-sm mt-1">
            <span>${item.name} x ${item.qty}</span>
            <span>${item.price * item.qty}€</span>
          </div>
        `).join("")}

        <div class="mt-2 font-bold">
          Total: ${cart.reduce((a,i)=>a+i.price*i.qty,0)}€
        </div>

        <div id="shipping" class="mt-2 text-sm text-gray-600">
          Envio: —
        </div>

        <div id="finalTotal" class="mt-2 font-bold">
          Total Final: —
        </div>
      </div>

      <button onclick="submitOrder()" 
        class="mt-6 w-full bg-[#575244] text-white py-3 rounded">
        Confirmar Encomenda
      </button>

    </div>
  `;
}
  if (view === "cart") {
    app.innerHTML = `
      <div class="p-4">
        <button onclick="view='home';render()">← Voltar</button>

        <h2 class="text-xl font-bold mt-2">Carrinho</h2>

        ${cart.length === 0 ? "<p>O carrinho está vazio</p>" : ""}

        ${cart.map(item => `
          <div class="bg-white p-3 mt-2 rounded flex justify-between">
            <span>${item.name} x ${item.qty}</span>
            <span>${item.price * item.qty}€</span>
          </div>
        `).join("")}

        <div class="mt-4 font-bold">
          Total: ${cart.reduce((a,i)=>a+i.price*i.qty,0)}€
        </div>

      <button onclick="goToCheckout()" class="mt-4 w-full bg-[#cfa05d] text-white py-3 rounded">
  Finalizar Encomenda
</button>
      </div>
    `;
  }

  lucide.createIcons();
}

// FUNÇÕES
function selectCategory(cat) {
  selectedCategory = cat;
  render();
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(i => i.id === id);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  render();
}
function goToCart() {
  view = "cart";
  render();
}
function viewProduct(id) {
  selectedProduct = products.find(p => p.id === id);
  activeImage = 0; 
  view = "product";
  render();
}
function changeImage(index) {
  activeImage = index;
  render();
}
function goToCheckout() {
  view = "checkout";
  render();
}
// INIT
document.addEventListener("DOMContentLoaded", loadProducts);

async function createOrder(customer, cart, total) {

 const { data, error } = await window.supabaseClient
  .from("orders")
  .insert({
    customer_name: customer.name,
    customer_email: customer.email,
    total: total,
    status: "pendente"
  })
  .select()
  .single();

  if (error) {
    alert("Erro ao criar encomenda");
    return;
  }

  const items = cart.map(item => ({
    order_id: data.id,
    product_name: item.name,
    quantity: item.qty,
    price: item.price
  }));

  await window.supabaseClient.from("order_items").insert(items);

  alert("Encomenda criada com sucesso!");
}

async function calculateShipping(zone, weight) {
  const { data } = await window.supabaseClient
    .from("shipping_rules")
    .select("*")
    .eq("zone", zone);

  const rule = data.find(r =>
    weight >= r.min_weight && weight <= r.max_weight
  );

  return rule ? rule.price : 0;
}
async function updateShipping() {
  const zone = document.getElementById("zone").value;

  if (!zone) return;

  const weight = cart.reduce((a,i)=>a+i.qty,0); // simplificado

  const shipping = await calculateShipping(zone, weight);

  const total = cart.reduce((a,i)=>a+i.price*i.qty,0);
  const final = total + shipping;

  document.getElementById("shipping").innerText = "Envio: " + shipping + "€";
  document.getElementById("finalTotal").innerText = "Total Final: " + final + "€";
}
async function submitOrder() {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const zone = document.getElementById("zone").value;

  if (!name || !email || !zone) {
    alert("Preenche todos os campos");
    return;
  }

  const total = cart.reduce((a,i)=>a+i.price*i.qty,0);
  const shipping = await calculateShipping(zone, cart.length);
  const final = total + shipping;

  await createOrder(
    { name, email },
    cart,
    final
  );

  cart = [];
  view = "home";
  render();
}

</script>

</body>
