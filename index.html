<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>  
<script src="https://cdn.tailwindcss.com"></script>

    body {
      background-color: #f7f3ef;
      color: #575244;
      font-family: montserrat, open sans;
    }
  </style>
</head>

<body>

<div id="app"></div>



<script>
const SUPABASE_URL = "https://kzlvxawotfnxjbnhysdx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6bHZ4YXdvdGZueGpibmh5c2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDQ4MzYsImV4cCI6MjA5MTM4MDgzNn0.Kh5ugtSRLQXLbsM2JXz6KJEv85L5H64IStftuLNfNd8";

window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ESTADO/VARIÁVEL GLOBAL
let view = "home";
let selectedCategory = "Todas";
let cart = [];
let products = [];
let selectedProduct = null;
let activeImage = 0;
let cartMessage = "";
let selectedFabric = null;
let selectedExterior = null;
let selectedLining = null;
let fabrics = [];

// PRODUTOS EXEMPLO (substituímos depois pelos teus reais)
async function loadProducts() {
  const { data, error } = await window.supabaseClient
    .from("products")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    alert("Erro ao carregar produtos");
    return;
  }

  products = data || [];
}

const categories = ["Todas", "Destaques", "Bebé e criança", "Mulher", "Sustentáveis", "Kits"];

// RENDER PRINCIPAL
function render() {
  const app = document.getElementById("app");

  if (!products.length) {
    app.innerHTML = "<p class='p-4'>A carregar produtos...</p>";
    return;
  }

  if (view === "home") return renderHome(app);
  if (view === "product") return renderProduct(app);
  if (view === "cart") return renderCart(app);
  if (view === "checkout") return renderCheckout(app);

  lucide.createIcons();
}
function renderHome(app) {
  let filtered;
  const outerFabrics = fabrics.filter(f => f.type === "outer");

  if (selectedCategory === "Todas") {
    filtered = products;
  } else if (selectedCategory === "Destaques") {
    filtered = products.filter(p => p.featured === true);
  } else {
    filtered = products.filter(p => p.category === selectedCategory);
  }

  app.innerHTML = `
    <header class="p-6 flex justify-between items-center bg-white shadow">
      <img src="https://res.cloudinary.com/dohslobkh/image/upload/v1775900519/Novo_logo_Bijudri_2026_ex16c9.png" style="height:100px;">
      <button onclick="goToCart()" class="relative">
        <i data-lucide="shopping-cart"></i>
        <span class="absolute -top-4 -right-4 bg-[#cfa05d] text-white text-xs px-4 rounded-full">
          ${cart.reduce((a,i)=>a+i.qty,0)}
        </span>
      </button>
    </header>

    <div class="p-4">
      <div class="flex gap-2 overflow-x-auto mb-6">
        ${categories.map(cat => `
          <button onclick="selectCategory('${cat}')"
            class="px-1 py-4 rounded-full border ${selectedCategory===cat?'bg-[#cfa05d] text-white':''}">
            ${cat}
          </button>
        `).join("")}
      </div>

      <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        ${filtered.map(p => `
          <div class="bg-white p-2 rounded-xl shadow-sm">
            <img src="${(p.image_url || '').split(',')[0]}" 
              class="w-full h-60 object-cover rounded">

            <h3 class="text-xs">${p.name}</h3>

            <div class="grid grid-cols-4 gap-2 mt-2">
              ${outerFabrics.map(f => `
                <img src="${f.image_url}"
                  onclick="selectExterior('${f.code}')"
                  class="h-16 border ${selectedExterior===f.code ? 'border-[#cfa05d]' : ''}">
              `).join("")}
            </div>

            <p>${p.price}€</p>

            <button onclick="viewProduct('${p.id}')">Ver produto</button>
            <button onclick="addToCart('${p.id}')">Adicionar</button>
          </div>
        `).join("")}
      </div>
    </div>
  `;

  lucide.createIcons();
}

function renderProduct(app) {
  if (!selectedProduct) {
    view = "home";
    return render();
  }

  const p = selectedProduct;
  const images = (p.image_url || '').split(',');

  const outerFabrics = fabrics.filter(f => f.type === "outer");
  const liningFabrics = fabrics.filter(f => f.type === "lining");

  app.innerHTML = `
    <div class="p-4">

      <button onclick="view='home';render()">← Voltar</button>

      <h1>${p.name}</h1>

      <img src="${images[0]}" class="w-full h-60 object-cover">

      <p>${p.price}€</p>

      <h3>Exterior</h3>
      ${outerFabrics.map(f => `
        <img src="${f.image_url}"
          onclick="selectExterior('${f.code}')"
          class="h-16 border ${selectedExterior===f.code ? 'border-[#cfa05d]' : ''}">
      `).join("")}

      ${p.has_lining ? `
        <h3>Forro</h3>
        ${liningFabrics.map(f => `
          <img src="${f.image_url}"
            onclick="selectLining('${f.code}')"
            class="h-16 border ${selectedLining===f.code ? 'border-[#cfa05d]' : ''}">
        `).join("")}
      ` : ""}

      <button onclick="addToCart('${p.id}')">Adicionar</button>

    </div>
  `;
}

function renderCart(app) {
  app.innerHTML = `
    <div class="p-4">
      <button onclick="view='home';render()">←</button>

      ${cart.map(item => `
        <div>
          ${item.name} x ${item.qty}
          <br>
          Ext: ${item.exterior}
          ${item.lining ? `| Forro: ${item.lining}` : ""}

          <div>
            <button onclick="changeQty('${item.id}','${item.exterior}','${item.lining}',-1)">-</button>
            <span>${item.qty}</span>
            <button onclick="changeQty('${item.id}','${item.exterior}','${item.lining}',1)">+</button>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}
  
function renderCheckout(app) {
  app.innerHTML = `
    <div class="p-4">
      <button onclick="view='cart';render()">←</button>

      <input id="name" placeholder="Nome">
      <input id="email" placeholder="Email">

      <select id="zone" onchange="updateShipping()">
        <option value="">Zona</option>
        <option value="Portugal">



// FUNÇÕES
function selectCategory(cat) {
  selectedCategory = cat;
  render();
}

function addToCart(id) {
  const product = products.find(p => p.id === id);

  if (!selectedExterior) {
    alert("Seleciona tecido exterior");
    return;
  }

  if (product.has_lining && !selectedLining) {
    alert("Seleciona tecido de forro");
    return;
  }

  const existing = cart.find(i => 
    i.id === id &&
    i.exterior === selectedExterior &&
    i.lining === selectedLining
  );

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      id: product.id,
      name: product.name,
      price: product.price,
      image_url: product.image_url,
      qty: 1,
      exterior: selectedExterior,
      lining: selectedLining
    });
  }

  cartMessage = "Adicionado ao carrinho ✅";

  setTimeout(() => {
    cartMessage = "";
    render();
  }, 1500);

  render();
}

function goToCart() {
  view = "cart";
  render();
}
  function viewProduct(id) {
  selectedProduct = products.find(p => String(p.id) === String(id));
  activeImage = 0; 
  view = "product";
  render();
}
function changeImage(index) {
  activeImage = index;
  render();
}
async function loadFabrics() {
  const { data, error } = await window.supabaseClient
    .from("fabrics")
    .select("*");

  if (error) {
    console.error("Erro tecidos", error);
    return;
  }

  fabrics = data || [];
}
function selectExterior(code) {
  selectedExterior = code;
  render();
}

function selectLining(code) {
  selectedLining = code;
  render();
}

function goToCheckout() {
  view = "checkout";
  render();
}

function changeQty(id, exterior, lining, delta) {
  const item = cart.find(i => 
    i.id === id &&
    i.exterior === exterior &&
    i.lining === lining
  );

  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    cart = cart.filter(i =>
      !(i.id === id && i.exterior === exterior && i.lining === lining)
    );
  }

  render();
}

function selectFabric(code) {
  selectedFabric = code;
  render();
}
  
// INIT
document.addEventListener("DOMContentLoaded", async () => {
  await loadProducts();
  await loadFabrics();
  render();
});
  
async function createOrder(customer, cart, total) {

 const { data, error } = await window.supabaseClient
  .from("orders")
  .insert({
    customer_name: customer.name,
    customer_email: customer.email,
    total: total,
    status: "pendente"
  })
  .select()
  .single();

  if (error) {
    alert("Erro ao criar encomenda");
    return;
  }

  const items = cart.map(item => ({
  order_id: data.id,
  product_name: item.name,
  quantity: item.qty,
  price: item.price,
  exterior: item.exterior,
  lining: item.lining
}));

  await window.supabaseClient.from("order_items").insert(items);

  alert("Encomenda criada com sucesso!");
}

async function calculateShipping(zone, weight) {
  const { data } = await window.supabaseClient
    .from("shipping_rules")
    .select("*")
    .eq("zone", zone);

  const rule = (data || []).find(r =>
    weight >= r.min_weight && weight <= r.max_weight
  );

  return rule ? rule.price : 0;
}
async function updateShipping() {
  const zone = document.getElementById("zone").value;

  if (!zone) return;

  const weight = cart.reduce((a,i)=>a+i.qty,0); // simplificado

  const shipping = await calculateShipping(zone, weight);

  const total = cart.reduce((a,i)=>a+i.price*i.qty,0);
  const final = total + shipping;

  document.getElementById("shipping").innerText = "Envio: " + shipping + "€";
  document.getElementById("finalTotal").innerText = "Total Final: " + final + "€";
}
async function submitOrder() {

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const zone = document.getElementById("zone").value;

  if (!name || !email || !zone) {
    alert("Preenche todos os campos");
    return;
  }

  const total = cart.reduce((a,i)=>a+i.price*i.qty,0);
  const shipping = await calculateShipping(zone, cart.length);
  const final = total + shipping;

  await createOrder(
    { name, email },
    cart,
    final
  );

  cart = [];
  view = "home";
  render();
}

</script>

</body>
</html>
