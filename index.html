<body>

<script>

window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ESTADO/VARIÁVEL GLOBAL
let view = "home";
let selectedCategory = "Todas";
let cart = [];
let products = [];
let selectedProduct = null;
let activeImage = 0;
let cartMessage = "";
let selectedFabric = null;
let selectedExterior = null;
let selectedLining = null;
let fabrics = [];

// PRODUTOS EXEMPLO (substituímos depois pelos teus reais)
async function loadProducts() {
  const { data, error } = await window.supabaseClient
    .from("products")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    alert("Erro ao carregar produtos");
    return;
  }

  products = data || [];
}

const categories = ["Todas", "Destaques", "Bebé e criança", "Mulher", "Sustentáveis", "Kits"];

// RENDER PRINCIPAL
function render() {
  const app = document.getElementById("app");

  if (!products.length) {
    app.innerHTML = "<p class='p-4'>A carregar produtos...</p>";
    return;
  }

  if (view === "home") renderHome(app);
  else if (view === "product") renderProduct(app);
  else if (view === "cart") renderCart(app);
  else if (view === "checkout") renderCheckout(app);

  lucide.createIcons();
}

function renderHome(app) {
  let filtered;
  const outerFabrics = fabrics.filter(f => f.type === "outer");

  if (selectedCategory === "Todas") {
    filtered = products;
  } else if (selectedCategory === "Destaques") {
    filtered = products.filter(p => p.featured === true);
  } else {
    filtered = products.filter(p => p.category === selectedCategory);
  
    lucide.createIcons();
  }

  app.innerHTML = `
  ${renderHeader()}
      <img src="https://res.cloudinary.com/dohslobkh/image/upload/v1775900519/Novo_logo_Bijudri_2026_ex16c9.png" style="height:100px;">
      <button onclick="goToCart()" class="relative">
        <i data-lucide="shopping-cart"></i>
        <span class="absolute -top-4 -right-4 bg-[#cfa05d] text-white text-xs px-4 rounded-full">
          ${cart.reduce((a,i)=>a+i.qty,0)}
        </span>
      </button>
    </header>

    <div class="p-4">
      <div class="flex gap-2 overflow-x-auto mb-6">
        ${categories.map(cat => `
          <button onclick="selectCategory('${cat}')"
            class="px-1 py-4 rounded-full border ${selectedCategory===cat?'bg-[#cfa05d] text-white':''}">
            ${cat}
          </button>
        `).join("")}
      </div>

      <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        ${filtered.map(p => `
          <div class="bg-white p-2 rounded-xl shadow-sm">
            <img src="${(p.image_url || '').split(',')[0]}" 
              class="w-full h-60 object-cover rounded">

            <h3 class="text-xs">${p.name}</h3>
            <p>${p.price}€</p>

            <button onclick="viewProduct('${p.id}')"
  class="mt-2 w-full border border-[#575244] text-[#575244] py-2 text-xs rounded hover:bg-[#575244] hover:text-white transition">
  Ver produto
</button>

<button onclick="addToCart('${p.id}')"
  class="mt-2 w-full bg-[#575244] text-white py-2 text-xs rounded hover:opacity-90 transition">
  Adicionar ao carrinho
</button>
          </div>
        `).join("")}
      </div>
    </div>
  `;

  lucide.createIcons();
}

function renderHeader() {
  return `
    <header class="p-4 flex justify-between items-center bg-white shadow sticky top-0 z-50">

      <div class="flex gap-4 items-center">
        <button onclick="view='home';render()" class="font-bold">Bijudri</button>

        <button onclick="view='home';render()" class="text-sm">Home</button>
        <button class="text-sm">Sobre mim</button>
        <button onclick="view='home';render()" class="text-sm">Produtos</button>
      </div>

      <button onclick="goToCart()" class="relative">
        <i data-lucide="shopping-cart"></i>

        <span class="absolute -top-2 -right-2 bg-[#cfa05d] text-white text-xs px-2 rounded-full">
          ${cart.reduce((a,i)=>a+i.qty,0)}
        </span>
      </button>

    </header>
  `;
  lucide.createIcons();
}  
  
function renderProduct(app) {
  if (!selectedProduct) {
    view = "home";
    return render();
  }

  const p = selectedProduct;
  const images = (p.image_url || '').split(',');

  const outerFabrics = fabrics.filter(f => f.type === "outer");
  const liningFabrics = fabrics.filter(f => f.type === "lining");

  lucide.createIcons();
  
  app.innerHTML = `
  ${renderHeader()}
    <div class="p-4">

      <button onclick="view='home';render()" class="text-sm mb-4">← Voltar</button>

      <h1 class="text-xl font-bold mb-2">${p.name}</h1>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- IMAGEM PRINCIPAL -->
        <div>
          <img src="${images[activeImage]}"
            class="w-full h-[450px] object-cover rounded-xl">
        </div>

        <!-- INFO -->
        <div>

          <!-- THUMBNAILS -->
          <div class="grid grid-cols-4 gap-2 mb-4">
            ${images.map((img, i) => `
              <img src="${img}"
                onclick="changeImage(${i})"
                class="h-20 w-full object-cover rounded cursor-pointer border ${activeImage===i ? 'border-[#cfa05d]' : ''}">
            `).join("")}
          </div>

          <p class="text-lg font-bold text-[#cfa05d]">${p.price}€</p>

          <p class="text-sm mt-2">${p.description || ''}</p>
<h3 class="mt-4 font-semibold text-[#575244]">
  Escolhe as tuas personalizações
</h3>

          <h3 class="mt-4 font-semibold">Exterior</h3>

<div class="grid grid-cols-4 gap-2 mt-2">
  ${outerFabrics.length ? outerFabrics.map(f => `
    <div onclick="selectExterior('${f.code}')"
      class="cursor-pointer border-2 rounded-lg overflow-hidden 
      ${selectedExterior===f.code ? 'border-[#cfa05d]' : 'border-transparent'}">

      <img src="${f.image_url}" 
        class="w-full h-20 object-cover">

    </div>
  `).join("") : "<p class='text-xs text-gray-500'>Sem tecidos disponíveis</p>"}
</div>

${p.has_lining ? `
  <h3 class="mt-4 font-semibold">Forro</h3>

  <div class="grid grid-cols-4 gap-2 mt-2">
    ${liningFabrics.length ? liningFabrics.map(f => `
      <div onclick="selectLining('${f.code}')"
        class="cursor-pointer border-2 rounded-lg overflow-hidden 
        ${selectedLining===f.code ? 'border-[#cfa05d]' : 'border-transparent'}">

        <img src="${f.image_url}" 
          class="w-full h-20 object-cover">

      </div>
    `).join("") : "<p class='text-xs text-gray-500'>Sem forros disponíveis</p>"}
  </div>
` : ""}

          <button onclick="addToCart('${p.id}')"
            class="mt-4 w-full bg-[#575244] text-white py-3 rounded">
            Adicionar ao carrinho
          </button>

        </div>
      </div>
    </div>
  `;
}
  
function renderCart(app) {
  app.innerHTML = `
  ${renderHeader()}

  <div class="p-4 max-w-3xl mx-auto">

    <button onclick="view='home';render()" class="text-sm mb-4">← Continuar a comprar</button>

    <h2 class="text-xl font-bold mb-4">Carrinho</h2>

    ${cart.length === 0 ? `
      <p class="text-gray-500">O teu carrinho está vazio</p>
    ` : ""}

    ${cart.map(item => `
      <div class="bg-white p-4 rounded-xl shadow mb-3 flex gap-4">

        <!-- IMAGEM -->
        <img src="${(item.image_url || '').split(',')[0]}" 
          class="w-20 h-20 object-cover rounded">

        <!-- INFO -->
        <div class="flex-1">

          <p class="font-semibold">${item.name}</p>

          <p class="text-xs text-gray-500 mt-1">
            Exterior: ${item.exterior || "-"}
            ${item.lining ? `<br>Forro: ${item.lining}` : ""}
          </p>

          <div class="flex items-center gap-2 mt-2">
            <button onclick="changeQty('${item.id}','${item.exterior}','${item.lining}',-1)"
              class="px-2 border rounded">-</button>

            <span>${item.qty}</span>

            <button onclick="changeQty('${item.id}','${item.exterior}','${item.lining}',1)"
              class="px-2 border rounded">+</button>
          </div>

        </div>

        <!-- PREÇO -->
        <div class="font-bold text-[#cfa05d]">
          ${item.price * item.qty}€
        </div>

      </div>
    `).join("")}

    <!-- TOTAL -->
    <div class="mt-6 text-right">
      <p class="text-lg font-bold">
        Total: ${cart.reduce((a,i)=>a+i.price*i.qty,0)}€
      </p>
    </div>

    <!-- CTA -->
    ${cart.length > 0 ? `
      <button onclick="goToCheckout()" 
        class="mt-6 w-full bg-[#575244] text-white py-3 rounded-xl">
        Finalizar Encomenda
      </button>
    ` : ""}
  lucide.createIcons();
  </div>
  `;
}
  
function renderCheckout(app) {
  app.innerHTML = `
  ${renderHeader()}

  <div class="p-4 max-w-3xl mx-auto">

    <button onclick="view='cart';render()" class="text-sm mb-4">← Voltar ao carrinho</button>

    <h2 class="text-xl font-bold mb-4">Checkout</h2>

    <!-- DADOS -->
    <div class="space-y-3">
      <input id="name" placeholder="Nome" class="w-full p-2 border rounded">
      <input id="email" placeholder="Email" class="w-full p-2 border rounded">
      <input id="phone" placeholder="Telemóvel" class="w-full p-2 border rounded">
      <input id="address" placeholder="Morada" class="w-full p-2 border rounded">
      <input id="city" placeholder="Localidade" class="w-full p-2 border rounded">
      <input id="postal" placeholder="Código Postal" class="w-full p-2 border rounded">
      <input id="country" placeholder="País" class="w-full p-2 border rounded">
    </div>

    <!-- RESUMO -->
    <div class="mt-6 bg-white p-4 rounded-xl shadow">
      <h3 class="font-bold mb-2">Resumo</h3>

      ${cart.map(item => `
        <div class="flex justify-between text-sm">
          <span>${item.name} x ${item.qty}</span>
          <span>${item.price * item.qty}€</span>
        </div>
      `).join("")}

      <div class="mt-2 font-bold">
        Total: ${cart.reduce((a,i)=>a+i.price*i.qty,0)}€
      </div>
    </div>

    <!-- ENVIO -->
    <div class="mt-6">
      <h3 class="font-bold mb-2">Método de envio</h3>
      <div id="shippingOptions"></div>

      <input id="inpost_address" placeholder="Morada do ponto InPost"
        class="w-full p-2 border rounded mt-2 hidden">
    </div>

    <!-- BOTÃO -->
    <button onclick="submitOrder()" 
      class="mt-6 w-full bg-[#575244] text-white py-3 rounded-xl">
      Confirmar Encomenda
    </button>

  </div>
  `;

  setTimeout(() => {
    renderShippingOptions();
  }, 100);
  lucide.createIcons();
}

async function renderShippingOptions() {
  const container = document.getElementById("shippingOptions");
  const options = await calculateShippingOptions();

  container.innerHTML = options.map(opt => `
    <label class="flex justify-between items-center border p-2 rounded cursor-pointer">
      <div>
        <input type="radio" name="shipping" value="${opt.method}" 
          onchange="selectShipping('${opt.method}')">
        <span class="ml-2 font-semibold">${opt.method}</span>
        <p class="text-xs text-gray-500">${opt.delivery_time}</p>
      </div>
      <span class="font-bold">
        ${opt.price !== null ? opt.price + "€" : "Indisponível"}
      </span>
    </label>
  `).join("");
    lucide.createIcons();
}

function selectShipping(method) {
  selectedShipping = method;

  if (method === "InPost") {
    document.getElementById("inpost_address").classList.remove("hidden");
  } else {
    document.getElementById("inpost_address").classList.add("hidden");
  }
  lucide.createIcons();
}

// FUNÇÕES
function selectCategory(cat) {
  selectedCategory = cat;
  render();
}

function addToCart(id) {
  const product = products.find(p => p.id === id);

  if (!selectedExterior) {
    alert("Seleciona tecido exterior");
    return;
  }

  if (product.has_lining && !selectedLining) {
    alert("Seleciona tecido de forro");
    return;
  }

  const existing = cart.find(i => 
    i.id === id &&
    i.exterior === selectedExterior &&
    i.lining === selectedLining
  );

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      id: product.id,
      name: product.name,
      price: product.price,
      image_url: product.image_url,
      qty: 1,
      exterior: selectedExterior,
      lining: selectedLining
    });
  }

  cartMessage = "Adicionado ao carrinho ✅";

  setTimeout(() => {
    cartMessage = "";
    render();
  }, 1500);

  render();
}

function goToCart() {
  view = "cart";
  render();
}
  function viewProduct(id) {
  selectedProduct = products.find(p => String(p.id) === String(id));
  activeImage = 0; 
  view = "product";
  render();
}
function changeImage(index) {
  activeImage = index;
  render();
}
async function loadFabrics() {
  const { data, error } = await window.supabaseClient
    .from("fabrics")
    .select("*");

  if (error) {
    console.error("Erro tecidos", error);
    return;
  }
console.log("FABRICS:", data);
  fabrics = data || [];
}
  
function selectExterior(code) {
  selectedExterior = code;
  render();
}

function selectLining(code) {
  selectedLining = code;
  render();
}

function goToCheckout() {
  view = "checkout";
  render();
}

function changeQty(id, exterior, lining, delta) {
  const item = cart.find(i => 
    i.id === id &&
    i.exterior === exterior &&
    i.lining === lining
  );

  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    cart = cart.filter(i =>
      !(i.id === id && i.exterior === exterior && i.lining === lining)
    );
  }

  render();
}

function selectFabric(code) {
  selectedFabric = code;
  render();
}

function getCartWeight() {
  return cart.reduce((total, item) => {
    const product = products.find(p => p.id === item.id);
    return total + ((product?.weight || 0) * item.qty);
  }, 0);
}

function getCartVolume() {
  return cart.reduce((total, item) => {
    const p = products.find(x => x.id === item.id);
    if (!p) return total;

    const volume = (p.length || 0) * (p.width || 0) * (p.height || 0);
    return total + volume * item.qty;
  }, 0);
}

let selectedShipping = null;
let shippingPrice = 0;

  
// INIT
document.addEventListener("DOMContentLoaded", async () => {
  await loadProducts();
  await loadFabrics();
  render();
});
  
async function createOrder(customer, cart, total) {

 const { data, error } = await window.supabaseClient
  .from("orders")
  .insert({
    customer_name: customer.name,
    customer_email: customer.email,
    total: total,
    status: "pendente"
  })
  .select()
  .single();

  if (error) {
    alert("Erro ao criar encomenda");
    return;
  }

  const items = cart.map(item => ({
  order_id: data.id,
  product_name: item.name,
  quantity: item.qty,
  price: item.price,
  exterior: item.exterior,
  lining: item.lining
}));

  await window.supabaseClient.from("order_items").insert(items);

  alert("Encomenda criada com sucesso!");
}

async function calculateShippingOptions() {
  const weight = getCartWeight();

  const { data, error } = await window.supabaseClient
    .from("shipping_rules")
    .select("*");

  if (error) {
    console.error("Erro ao carregar envios", error);
    return [];
  }

  const methods = ["CTT Verde", "CTT Registado", "InPost"];

  return methods.map(method => {
    const rule = data.find(r =>
      r.method === method &&
      weight >= r.min_weight &&
      weight <= r.max_weight
    );

    return {
      method,
      price: rule ? rule.price : null,
      delivery_time: rule ? rule.delivery_time : "-"
    };
  });
}

async function submitOrder() {

  const customer = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    city: document.getElementById("city").value,
    postal: document.getElementById("postal").value,
    country: document.getElementById("country").value,
    inpost: document.getElementById("inpost_address").value
  };

  if (!customer.name || !customer.email || !selectedShipping) {
    alert("Preenche os campos obrigatórios");
    return;
  }

  const options = await calculateShippingOptions();
  const selected = options.find(o => o.method === selectedShipping);

  const shipping = selected?.price || 0;

  const total = cart.reduce((a,i)=>a+i.price*i.qty,0);
  const final = total + shipping;

  await createOrder(customer, cart, final);

  cart = [];
  view = "home";
  render();
}

</script>
