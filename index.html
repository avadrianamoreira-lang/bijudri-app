// PRODUTOS EXEMPLO (substituímos depois pelos teus reais)
async function loadProducts() {
  const { data, error } = await window.supabaseClient
    .from("products")
    .select("*");

  productsLoaded = true;

  if (error) {
    console.error("Erro ao carregar produtos:", error);

    products = [];
    return;
  }

  products = data || [];
}

const categories = ["Todas", "Destaques", "Bebé e criança", "Mulher", "Sustentáveis", "Kits"];

// RENDER PRINCIPAL
function render() {
  const app = document.getElementById("app");

  if (!productsLoaded) {
    app.innerHTML = "<p class='p-4'>A carregar produtos...</p>";
    return;
  }

  if (products.length === 0) {
    app.innerHTML = "<p class='p-4'>Sem produtos disponíveis.</p>";
    return;

  if (view === "home") renderHome(app);
  else if (view === "product") renderProduct(app);
  else if (view === "cart") renderCart(app);
  else if (view === "checkout") renderCheckout(app);

}

function bindEvents() {

function renderHeader() {
  const cartCount = cart.reduce((a, i) => a + i.qty, 0);

}

function renderProduct(app) {

  const outerFabrics = fabrics.filter(f => f.type === "outer");

  const thumbnailsHTML = images.map((img, i) => `
    <img src="${img}"
      onclick="changeImage(${i})"
      class="h-20 w-full object-cover rounded cursor-pointer border ${activeImage === i ? 'border-[#cfa05d]' : 'border-transparent'}">
  `).join("");

  const exteriorHTML = outerFabrics.length
    ? outerFabrics.map(f => `
      <div onclick="selectExterior('${f.code}')"
        class="cursor-pointer border-2 rounded-lg overflow-hidden ${selectedExterior === f.code ? 'border-[#cfa05d]' : 'border-transparent'}">
        <img src="${f.image_url}" class="w-full h-20 object-cover">
      </div>
    `).join("")
    : `<p class="text-xs text-gray-500">Sem tecidos disponíveis</p>`;

  const liningHTML = p.has_lining
    ? `
      <h3 class="mt-4 font-semibold">Forro</h3>
      <div class="grid grid-cols-4 gap-2 mt-2">
        ${liningFabrics.length
          ? liningFabrics.map(f => `
            <div onclick="selectLining('${f.code}')"
              class="cursor-pointer border-2 rounded-lg overflow-hidden ${selectedLining === f.code ? 'border-[#cfa05d]' : 'border-transparent'}">
              <img src="${f.image_url}" class="w-full h-20 object-cover">
            </div>
          `).join("")
          : `<p class="text-xs text-gray-500">Sem forros disponíveis</p>`
        }

    `
    : "";

  app.innerHTML = `
    ${renderHeader()}
    <div class="p-4">
      <button onclick="view='home';render()" class="text-sm mb-4">← Voltar</button>

      <h1 class="text-xl font-bold mb-2">${p.name}</h1>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <img src="${images[activeImage] || ''}" class="w-full h-[450px] object-cover rounded-xl">
        </div>

        <div>
          <div class="grid grid-cols-4 gap-2 mb-4">
            ${thumbnailsHTML}
          </div>

          <p class="text-lg font-bold text-[#cfa05d]">${Number(p.price) || 0}€</p>
          <p class="text-sm mt-2">${p.description || ""}</p>

          <h3 class="mt-4 font-semibold text-[#575244]">Escolhe as tuas personalizações</h3>

          <h3 class="mt-4 font-semibold">Exterior</h3>
          <div class="grid grid-cols-4 gap-2 mt-2">
            ${exteriorHTML}
          </div>

          ${liningHTML}

          <button onclick="addToCart('${p.id}')"
            class="mt-4 w-full bg-[#575244] text-white py-3 rounded">
            Adicionar ao carrinho
          </button>

          ${cartMessage ? `<p class="mt-2 text-green-600 text-sm">${cartMessage}</p>` : ""}
        </div>
      </div>
    </div>
  `;
}

function renderCart(app) {
  app.innerHTML = `
  ${renderHeader()}

  <div class="p-4 max-w-3xl mx-auto">

    <button onclick="view='home';render()" class="text-sm mb-4">← Continuar a comprar</button>

    <h2 class="text-xl font-bold mb-4">Carrinho</h2>

    ${

    <!-- TOTAL -->
    <div class="mt-6 text-right">
      <p class="text-lg font-bold">
        Total: ${cart.reduce((a,i)=>a+i.price*i.qty,0)}€
      </p>
    </div>

    <!-- CTA -->
    ${
      cart.length > 0
        ? `<button onclick="goToCheckout()"

</button>`

}

  const subtotal = cart.reduce((a, i) => a + (Number(i.price) || 0) * (Number(i.qty) || 0), 0);

  app.innerHTML = `
    ${renderHeader()}

      <button onclick="view='cart';render()" class="text-sm mb-4">← Voltar ao carrinho</button>

}

async function renderShippingOptions() {
  const container = document.getElementById("shippingOptions");
  const options = await calculateShippingOptions();

  container.innerHTML = options.map(opt => `
    <label class="flex justify-between items-center border p-2 rounded cursor-pointer ${opt.price === null ? 'opacity-50' : ''}">
      <div>
        <input 
          type="radio" 
          name="shipping" 
          value="${opt.method}" 
          ${opt.price === null ? 'disabled' : ''}
          onchange="selectShipping('${opt.method}')">
        <span class="ml-2 font-semibold">${opt.method}</span>
        <p class="text-xs text-gray-500">${opt.delivery_time}</p>
      </div>
      <span class="font-bold">
        ${opt.price !== null ? opt.price + "€" : "Indisponível"}
      </span>
    </label>
  `).join("");
}

function selectShipping(method) {
  selectedShipping = method;

  const inpostField = document.getElementById("inpost_address");

  if (!inpostField) return;

  if (method === "InPost - Locker ou Ponto Pack") {
    inpostField.classList.remove("hidden");
  } else {
    inpostField.classList.add("hidden");
    inpostField.value = "";
  }
  renderCheckoutSummary();
}

// FUNÇÕES
function selectCategory(cat) {
  selectedCategory = cat;
  render();
}

function addToCart(id) {
  const product = products.find(p => String(p.id) === String(id));

  if (!product) {
    alert("Produto não encontrado");
    return;
  }

  const outerFabrics = fabrics.filter(f => f.type === "outer");
  const requiresExterior = outerFabrics.length > 0;
  const requiresLining = product.has_lining === true;

  if (view === "product") {
    if (requiresExterior && !selectedExterior) {
      alert("Seleciona tecido exterior");
      return;
    }

    if (requiresLining && !selectedLining) {
      alert("Seleciona tecido de forro");
      return;
    }
  } else {
    viewProduct(id);
    return;
  }

  const existing = cart.find(i =>
    String(i.id) === String(id) &&
    i.exterior === selectedExterior &&
    i.lining === selectedLining
  );

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      id: product.id,
      name: product.name,
      price: Number(product.price) || 0,
      image_url: product.image_url || "",
      qty: 1,
      exterior: selectedExterior || null,
      lining: selectedLining || null
    });
  }

  cartMessage = "Adicionado ao carrinho ✅";

  setTimeout(() => {
    cartMessage = "";
    render();
  }, 1500);

  render();
}

function goToCart() {
  view = "cart";
  render();
}
 function viewProduct(id) {
  selectedProduct = products.find(p => String(p.id) === String(id));
  activeImage = 0;
  selectedExterior = null;
  selectedLining = null;
  cartMessage = "";
  view = "product";
  render();
}

async function loadFabrics() {
  const { data, error } = await window.supabaseClient
    .from("fabrics")
    .select("*");

  if (error) {
    console.error("Erro tecidos", error);
    return;
  }
console.log("FABRICS:", data);
  fabrics = data || [];
}
  
function selectExterior(code) {
  selectedExterior = code;
  render();
}

function selectLining(code) {
  selectedLining = code;
  render();
}

function goToCheckout() {
  view = "checkout";
  render();
}

function changeQty(id, exterior, lining, delta) {
  const item = cart.find(i => 
    i.id === id &&
    i.exterior === exterior &&
    i.lining === lining
  );

  if (!item) return;

  item.qty += delta;

  if (item.qty <= 0) {
    cart = cart.filter(i =>
      !(i.id === id && i.exterior === exterior && i.lining === lining)
    );
  }

  render();
}

function selectFabric(code) {
  selectedFabric = code;
  render();
}

function getCartWeight() {
  return cart.reduce((total, item) => {
    const product = products.find(p => p.id === item.id);
    return total + ((product?.weight || 0) * item.qty);
  }, 0);
}

function getCartVolume() {
  return cart.reduce((total, item) => {
    const p = products.find(x => x.id === item.id);
    if (!p) return total;

    const volume = (p.length || 0) * (p.width || 0) * (p.height || 0);
    return total + volume * item.qty;
  }, 0);
}

function getFabricByCode(code) {
  return fabrics.find(f => f.code === code);
}

function getCartDimensions() {
  let maxLength = 0;
  let maxHeight = 0;
  let maxWidth = 0;

  cart.forEach(item => {
    const p = products.find(prod => prod.id === item.id);
    if (!p) return;

    maxLength = Math.max(maxLength, p.length || 0);
    maxHeight = Math.max(maxHeight, p.height || 0);
    maxWidth = Math.max(maxWidth, p.width || 0);
  });

  return { length: maxLength, height: maxHeight, width: maxWidth };
}
  
// INIT
document.addEventListener("DOMContentLoaded", async () => {
  await loadProducts();
  await loadFabrics();
  render();
});
  
async function createOrder(customer, cart, total, subtotal, shippingPriceValue) {
  const orderPayload = {
    customer_name: customer.name,
    customer_email: customer.email,
    customer_phone: customer.phone || null,
    address: customer.address || null,
    city: customer.city || null,
    postal_code: customer.postal || null,
    country: customer.country || null,
    inpost_address: customer.inpost || null,
    subtotal: Number(subtotal) || 0,
    shipping_price: Number(shippingPriceValue) || 0,
    total: Number(total) || 0,
    status: "pendente",
    shipping_method: selectedShipping
  };

  const { data, error } = await window.supabaseClient
    .from("orders")
    .insert(orderPayload)
    .select()
    .single();

  if (error) {
    console.error("Erro ao criar encomenda:", error);
    alert("Erro ao criar encomenda: " + error.message);
    return;
  }

  const items = cart.map(item => ({
    order_id: data.id,
    product_id: item.id,
    product_name: item.name,
    quantity: Number(item.qty) || 1,
    price: Number(item.price) || 0,
    exterior: item.exterior || null,
    lining: item.lining || null
  }));

  const { error: itemsError } = await window.supabaseClient
    .from("order_items")
    .insert(items);

  if (itemsError) {
    console.error("Erro ao guardar artigos:", itemsError);
    alert("Encomenda criada, mas houve erro ao guardar os artigos: " + itemsError.message);
    return;
  }

  alert("Encomenda criada com sucesso!");
}

async function calculateShippingOptions() {
  const weight = Number(getCartWeight()) || 0;
  const dimensions = getCartDimensions();

  const length = Number(dimensions.length) || 0;
  const height = Number(dimensions.height) || 0;
  const width = Number(dimensions.width) || 0;

  const { data, error } = await window.supabaseClient
    .from("shipping_rules")
    .select("*");

  if (error) {
    console.error("Erro ao carregar envios:", error);
    return [];
  }

  console.log("PESO:", weight);
  console.log("DIMENSÕES:", { length, height, width });
  console.log("REGRAS ENVIO:", data);

  const methods = [
    "CTT Correio Verde",
    "CTT Correio Registado",
    "InPost - Locker ou Ponto Pack"
  ];

  return methods.map(method => {
    const validRules = data.filter(r =>
      r.method === method &&
      weight >= Number(r.min_weight || 0) &&
      weight <= Number(r.max_weight || 999999) &&
      height >= Number(r.min_height || 0) &&
      height <= Number(r.max_height || 999999) &&
      length >= Number(r.min_length || 0) &&
      length <= Number(r.max_length || 999999) &&
      width >= Number(r.min_width || 0) &&
      width <= Number(r.max_width || 999999)
    );

    console.log("Método:", method, "Regras válidas:", validRules);

    const rule = validRules[0];

    return {
      method,
      price: rule ? Number(rule.price) : null,
      delivery_time: rule ? rule.delivery_time : "-"
    };
  });
}

async function startCheckout() {
  const customer = {
    name: document.getElementById("name")?.value.trim() || "",
    email: document.getElementById("email")?.value.trim() || "",
    phone: document.getElementById("phone")?.value.trim() || "",
    address: document.getElementById("address")?.value.trim() || "",
    city: document.getElementById("city")?.value.trim() || "",
    postal: document.getElementById("postal")?.value.trim() || "",
    country: document.getElementById("country")?.value.trim() || "",
    inpost: document.getElementById("inpost_address")?.value.trim() || ""
  };

  if (!customer.name || !customer.email || !selectedShipping) {
    alert("Preenche os campos obrigatórios.");
    return;
  }

  if (selectedShipping === "InPost - Locker ou Ponto Pack" && !customer.inpost) {
    alert("Indica a morada do ponto InPost.");
    return;
  }

  const options = await calculateShippingOptions();
  const selected = options.find(o => o.method === selectedShipping);

  if (!selected || selected.price === null) {
    alert("O método de envio selecionado não está disponível.");
    return;
  }

  const subtotal = cart.reduce(
    (a, i) => a + (Number(i.price) || 0) * (Number(i.qty) || 0),
    0
  );

  const shipping = Number(selected.price) || 0;
  const total = subtotal + shipping;

  const response = await fetch("/api/create-checkout-session", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      customer,
      cart,
      shippingMethod: selectedShipping,
      shippingPrice: shipping,
      subtotal,
      total
    })
  });

  const data = await response.json();

  if (!response.ok) {
    alert("Erro ao iniciar pagamento: " + (data.error || "Erro desconhecido"));
    return;
  }

  window.location.href = data.url;
}
